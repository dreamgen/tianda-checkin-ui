<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="天達報到">
  <meta name="theme-color" content="#2F6783">
  <meta name="description" content="天達大班報到系統 - 現代化報到管理 PWA">
  <title>天達大班報到系統</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: "#2F6783", light: "#3d8aa8", dark: "#1e4d63", xdark: "#12303f", pale: "#e0edf5" },
            success: "#10B97A", warning: "#FBBF24", danger: "#F0554C"
          },
          fontFamily: { sans: ["Inter","Noto Sans TC","sans-serif"] }
        }
      }
    }
  </script>
  <style>
    /* ── CSS Variables ───────────────────────────────── */
    :root {
      --color-primary: #2F6783;
      --color-primary-dark: #1e4d63;
      --color-primary-light: #e0edf5;
      --color-success: #10B97A;
      --color-warning: #FBBF24;
      --color-danger: #F0554C;
      --color-neutral: #8F8F8F;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --radius-card: 16px;
      --shadow-card: 0 1px 4px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04);
    }

    html, body { height: 100%; font-family: "Inter","Noto Sans TC",sans-serif; }
    body { background: #f0f4f8; overflow: hidden; }

    /* ── App Shell ───────────────────────────────────── */
    #app-shell { display: flex; height: 100vh; height: 100dvh; overflow: hidden; }

    /* ── Sidebar (desktop) ───────────────────────────── */
    #sidebar { width: 240px; background: linear-gradient(180deg,#2F6783 0%,#1e4d63 100%); color: white; flex-shrink: 0; display: flex; flex-direction: column; overflow-y: auto; }
    @media(max-width:767px){ #sidebar { display:none; } }
    .sidebar-brand { padding: 24px 20px 16px; border-bottom: 1px solid rgba(255,255,255,.15); }
    .sidebar-brand h1 { font-size: 1.1rem; font-weight: 700; line-height: 1.3; }
    .sidebar-brand p { font-size: 0.75rem; opacity: .7; margin-top: 2px; }
    .sidebar-nav { padding: 12px 0; flex: 1; }
    .sidebar-item { display: flex; align-items: center; gap: 12px; padding: 11px 20px; color: rgba(255,255,255,.75); font-size: .875rem; cursor: pointer; transition: all .15s; border-left: 3px solid transparent; }
    .sidebar-item:hover { background: rgba(255,255,255,.1); color: white; }
    .sidebar-item.active { background: rgba(255,255,255,.15); color: white; border-left-color: white; font-weight: 600; }
    .sidebar-item i { width: 20px; text-align: center; font-size: 1rem; }
    .sidebar-divider { height: 1px; background: rgba(255,255,255,.1); margin: 8px 20px; }

    /* ── Main content area ───────────────────────────── */
    #main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    /* ── Mobile Header ───────────────────────────────── */
    #mobile-header { background: #2F6783; color: white; padding: 0 16px; height: 56px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,.2); }
    #mobile-header h2 { flex: 1; font-size: 1rem; font-weight: 600; }
    #menu-btn { font-size: 1.25rem; cursor: pointer; padding: 8px; }
    @media(min-width:768px){ #mobile-header { display: none; } }
    #schedule-badge { font-size: .7rem; background: rgba(255,255,255,.2); padding: 2px 8px; border-radius: 99px; white-space: nowrap; }

    /* ── App view container ──────────────────────────── */
    #app-view { flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: calc(72px + var(--safe-bottom)); }
    @media(min-width:768px){ #app-view { padding-bottom: 16px; } }
    .view-container { animation: fadeIn .2s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

    /* ── Bottom Nav (mobile) ─────────────────────────── */
    #bottom-nav { background: white; border-top: 1px solid #e5e7eb; display: flex; padding-bottom: var(--safe-bottom); flex-shrink: 0; box-shadow: 0 -2px 12px rgba(0,0,0,.08); }
    @media(min-width:768px){ #bottom-nav { display: none; } }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; padding: 8px 4px; color: #9ca3af; font-size: .65rem; cursor: pointer; transition: color .15s; border: none; background: none; }
    .nav-item.active { color: #2F6783; }
    .nav-item.active i { font-weight: 900; }
    .nav-item i { font-size: 1.25rem; }

    /* ── Mobile sidebar overlay ──────────────────────── */
    #mobile-sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:40; }
    #mobile-sidebar-panel { position:fixed; left:-280px; top:0; bottom:0; width:280px; background:linear-gradient(180deg,#2F6783 0%,#1e4d63 100%); z-index:50; transition:left .25s ease; overflow-y:auto; color:white; }
    #mobile-sidebar-panel.open { left:0; }
    #mobile-sidebar-overlay.open { display:block; }

    /* ── Cards ───────────────────────────────────────── */
    .card { background: white; border-radius: var(--radius-card); box-shadow: var(--shadow-card); }
    .card-header { padding: 16px 20px 12px; border-bottom: 1px solid #f3f4f6; font-weight: 600; color: #1f2937; display: flex; align-items: center; gap: 8px; }

    /* ── KPI Cards ───────────────────────────────────── */
    .kpi-card { background: white; border-radius: 14px; padding: 16px; box-shadow: var(--shadow-card); display: flex; flex-direction: column; gap: 4px; }
    .kpi-value { font-size: 2rem; font-weight: 700; line-height: 1; }
    .kpi-label { font-size: .75rem; color: #6b7280; }

    /* ── Status badges ───────────────────────────────── */
    .badge { display: inline-flex; align-items: center; gap: 3px; font-size: .7rem; font-weight: 600; padding: 2px 8px; border-radius: 99px; white-space: nowrap; }
    .badge-present { background: #d1fae5; color: #065f46; }
    .badge-absent  { background: #fee2e2; color: #991b1b; }
    .badge-leave   { background: #fef3c7; color: #92400e; }
    .badge-late    { background: #dbeafe; color: #1e40af; }
    .badge-temp    { background: #ede9fe; color: #5b21b6; }
    .badge-unknown { background: #f3f4f6; color: #6b7280; }
    .badge-active  { background: #d1fae5; color: #065f46; }
    .badge-mode    { background: #e0edf5; color: #2F6783; }

    /* Gender badges */
    .badge-male   { background: #dbeafe; color: #1e40af; }
    .badge-female { background: #fce7f3; color: #9d174d; }

    /* ── Member items (list) ─────────────────────────── */
    .member-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid #f3f4f6; cursor: pointer; transition: background .1s; }
    .member-item:hover { background: #f9fafb; }
    .member-item:last-child { border-bottom: none; }
    .member-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg,#2F6783,#3d8aa8); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: .875rem; flex-shrink: 0; }

    /* ── Member cards (grid) ─────────────────────────── */
    .member-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    @media(min-width:768px){ .member-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); } }
    .member-card { background: white; border-radius: 14px; padding: 16px 12px; box-shadow: var(--shadow-card); cursor: pointer; transition: all .15s; text-align: center; border: 1.5px solid transparent; }
    .member-card:hover { border-color: var(--color-primary-light); transform: translateY(-2px); box-shadow: 0 4px 20px rgba(47,103,131,.12); }
    .member-card-avatar { width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg,#2F6783,#3d8aa8); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 1.25rem; margin: 0 auto 10px; position: relative; }
    .status-dot { position: absolute; bottom: 0; right: 0; width: 13px; height: 13px; border-radius: 50%; border: 2px solid white; }
    .status-dot.present { background: var(--color-success); }
    .status-dot.absent  { background: #e5e7eb; }
    .status-dot.leave   { background: var(--color-warning); }
    .member-card-name { font-size: .875rem; font-weight: 600; color: #1f2937; margin-bottom: 4px; }
    .member-card-meta { font-size: .7rem; color: #9ca3af; margin-bottom: 6px; }

    /* ── Search input ────────────────────────────────── */
    .search-input { width: 100%; padding: 10px 16px 10px 40px; border: 1px solid #e5e7eb; border-radius: 12px; font-size: .9rem; outline: none; background: white; transition: border-color .15s; }
    .search-input:focus { border-color: #2F6783; box-shadow: 0 0 0 3px rgba(47,103,131,.1); }
    .search-plain { padding-left: 16px !important; }

    /* ── Buttons ─────────────────────────────────────── */
    .btn-primary   { background: #2F6783; color: white; border: none; border-radius: 12px; padding: 12px 24px; font-size: .9rem; font-weight: 600; cursor: pointer; transition: all .15s; display: inline-flex; align-items: center; gap: 8px; justify-content: center; }
    .btn-primary:hover  { background: #1e4d63; }
    .btn-primary:active { transform: scale(.97); }
    .btn-secondary { background: #f3f4f6; color: #374151; border: none; border-radius: 12px; padding: 10px 20px; font-size: .875rem; font-weight: 500; cursor: pointer; transition: all .15s; display: inline-flex; align-items: center; gap: 8px; justify-content: center; }
    .btn-secondary:hover { background: #e5e7eb; }
    .btn-danger    { background: #fee2e2; color: #dc2626; border: none; border-radius: 12px; padding: 10px 20px; font-size: .875rem; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; justify-content: center; }

    /* ── Toast ───────────────────────────────────────── */
    #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; min-width: 260px; }
    .toast { background: #1f2937; color: white; padding: 12px 20px; border-radius: 12px; font-size: .875rem; box-shadow: 0 4px 12px rgba(0,0,0,.2); animation: slideDown .25s ease; pointer-events: auto; display: flex; align-items: center; gap: 10px; }
    .toast.success { background: #065f46; }
    .toast.error   { background: #991b1b; }
    @keyframes slideDown { from{opacity:0;transform:translateY(-12px)} to{opacity:1;transform:none} }

    /* ── Loading overlay ─────────────────────────────── */
    #loading-overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,.85); z-index: 100; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
    #loading-overlay.show { display: flex; }
    .spinner { width: 40px; height: 40px; border: 3px solid #e5e7eb; border-top-color: #2F6783; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* ── Scanner ─────────────────────────────────────── */
    .scanner-box { position: relative; width: 240px; height: 240px; margin: 0 auto; }
    .scan-line { position: absolute; left: 10px; right: 10px; height: 2px; background: linear-gradient(90deg, transparent, #2F6783, transparent); animation: scanAnim 2s ease-in-out infinite; }
    @keyframes scanAnim { 0%,100%{top:10px;opacity:.5} 50%{top:calc(100% - 12px);opacity:1} }
    .corner-tl,.corner-tr,.corner-bl,.corner-br { position:absolute; width:24px; height:24px; border-color:#2F6783; border-style:solid; }
    .corner-tl { top:0; left:0;    border-width:3px 0 0 3px; border-radius:4px 0 0 0; }
    .corner-tr { top:0; right:0;   border-width:3px 3px 0 0; border-radius:0 4px 0 0; }
    .corner-bl { bottom:0; left:0; border-width:0 0 3px 3px; border-radius:0 0 0 4px; }
    .corner-br { bottom:0; right:0;border-width:0 3px 3px 0; border-radius:0 0 4px 0; }

    /* Scanner success overlay */
    #scanner-success { display:none; position:absolute; inset:0; background:rgba(16,185,122,.9); align-items:center; justify-content:center; flex-direction:column; color:white; gap:8px; border-radius:12px; }
    #scanner-success.show { display:flex; animation: popIn .25s ease; }
    @keyframes popIn { from{transform:scale(.85);opacity:0} to{transform:scale(1);opacity:1} }

    /* ── Toggle switch ───────────────────────────────── */
    .toggle-switch { width: 48px; height: 26px; border-radius: 99px; background: #d1d5db; position: relative; cursor: pointer; transition: background .2s; flex-shrink: 0; border: none; padding: 0; }
    .toggle-switch.on { background: #2F6783; }
    .toggle-switch::after { content:''; position:absolute; top:3px; left:3px; width:20px; height:20px; border-radius:50%; background:white; box-shadow:0 1px 3px rgba(0,0,0,.2); transition:transform .2s; }
    .toggle-switch.on::after { transform:translateX(22px); }

    /* ── Progress bar ────────────────────────────────── */
    .progress-bar  { height: 8px; background: #e5e7eb; border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg,#2F6783,#3d8aa8); border-radius: 99px; transition: width .5s ease; }

    /* ── Section headers ─────────────────────────────── */
    .section-title { font-size: .75rem; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: .05em; padding: 12px 16px 6px; }

    /* ── Tabs ────────────────────────────────────────── */
    .tab-bar  { display: flex; border-bottom: 2px solid #e5e7eb; background: white; }
    .tab-btn  { flex: 1; padding: 12px 8px; font-size: .875rem; font-weight: 500; color: #6b7280; border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .15s; }
    .tab-btn.active { color: #2F6783; border-bottom-color: #2F6783; font-weight: 600; }

    /* ── Setup prompt ────────────────────────────────── */
    .setup-prompt { background: linear-gradient(135deg,#2F6783,#1e4d63); color: white; border-radius: 16px; padding: 24px; margin: 16px; text-align: center; }

    /* ── Checkin checkbox ────────────────────────────── */
    .checkin-check { width: 28px; height: 28px; border-radius: 8px; border: 2px solid #d1d5db; background: white; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .15s; flex-shrink: 0; }
    .checkin-check.checked { background: #2F6783; border-color: #2F6783; color: white; }

    /* ── Timeline (class-schedule / member-history) ───── */
    .timeline { position: relative; padding-left: 28px; }
    .timeline::before { content:''; position:absolute; left:9px; top:0; bottom:0; width:2px; background:#e5e7eb; }
    .timeline-item { position: relative; padding-bottom: 20px; }
    .timeline-dot { position:absolute; left:-24px; top:3px; width:12px; height:12px; border-radius:50%; border:2px solid white; background:#d1d5db; box-shadow:0 0 0 2px #e5e7eb; }
    .timeline-dot.past    { background:#d1d5db; }
    .timeline-dot.current { background:#2F6783; box-shadow:0 0 0 3px #e0edf5; }
    .timeline-dot.future  { background:white; border-color:#2F6783; }
    .timeline-item:last-child { padding-bottom: 0; }

    /* ── Bottom Sheet ────────────────────────────────── */
    .bottom-sheet-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:200; }
    .bottom-sheet-overlay.open { display:block; }
    .bottom-sheet { position:fixed; bottom:0; left:0; right:0; background:white; border-radius:20px 20px 0 0; padding:20px; z-index:201; transform:translateY(100%); transition:transform .3s ease; max-height:80vh; overflow-y:auto; }
    .bottom-sheet.open { transform:translateY(0); }
    .bottom-sheet-handle { width:36px; height:4px; background:#d1d5db; border-radius:99px; margin:0 auto 16px; }

    /* ── Large text mode ─────────────────────────────── */
    body.large-text .member-item { padding: 16px; }
    body.large-text .member-item .text-sm  { font-size: 1rem !important; }
    body.large-text .member-item .text-base { font-size: 1.125rem !important; }
    body.large-text .member-avatar { width: 48px; height: 48px; font-size: 1rem; }

    /* ── Form inputs ─────────────────────────────────── */
    .form-input { width: 100%; border: 1px solid #e5e7eb; border-radius: 12px; padding: 10px 14px; font-size: .9rem; outline: none; transition: border-color .15s; }
    .form-input:focus { border-color: #2F6783; box-shadow: 0 0 0 3px rgba(47,103,131,.1); }
    .form-label { display: block; font-size: .8rem; font-weight: 500; color: #6b7280; margin-bottom: 5px; }

    /* ── Filter pills ────────────────────────────────── */
    .filter-pill { display: inline-flex; align-items: center; gap: 4px; background: var(--color-primary-light); color: var(--color-primary); border-radius: 99px; padding: 4px 10px; font-size: .75rem; font-weight: 500; }
    .filter-pill button { line-height: 1; background: none; border: none; cursor: pointer; color: var(--color-primary); opacity: .7; }

    /* ── Divider rows ────────────────────────────────── */
    .info-row { display: flex; gap: 12px; padding: 10px 16px; align-items: flex-start; }
    .info-row-label { font-size: .8rem; color: #9ca3af; width: 72px; flex-shrink: 0; padding-top: 1px; }
    .info-row-value { font-size: .875rem; color: #1f2937; font-weight: 500; flex: 1; }
  </style>
</head>
<body>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- Loading overlay -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <p class="text-gray-500 text-sm" id="loading-msg">載入中...</p>
</div>

<!-- Bottom Sheet (Quick Search advanced filter) -->
<div id="qs-sheet-overlay" class="bottom-sheet-overlay" onclick="closeQsSheet()"></div>
<div id="qs-bottom-sheet" class="bottom-sheet">
  <div class="bottom-sheet-handle"></div>
  <h3 class="font-bold text-gray-800 mb-4">進階篩選</h3>
  <div class="space-y-3">
    <div>
      <label class="form-label">區別</label>
      <select id="qs-adv-unit" class="form-input">
        <option value="">所有區別</option>
      </select>
    </div>
    <div>
      <label class="form-label">班別</label>
      <select id="qs-adv-class" class="form-input">
        <option value="">所有班別</option>
      </select>
    </div>
    <div>
      <label class="form-label">報到狀態</label>
      <select id="qs-adv-status" class="form-input">
        <option value="">所有狀態</option>
        <option value="present">已報到</option>
        <option value="absent">未報到</option>
        <option value="leave">請假</option>
      </select>
    </div>
    <div class="flex gap-2 pt-2">
      <button onclick="clearQsFilter()" class="btn-secondary flex-1">清除</button>
      <button onclick="applyQsFilter()" class="btn-primary flex-1">套用篩選</button>
    </div>
  </div>
</div>

<!-- Mobile Sidebar Overlay -->
<div id="mobile-sidebar-overlay" onclick="closeMobileSidebar()"></div>
<div id="mobile-sidebar-panel">
  <div class="sidebar-brand">
    <h1>天達大班報到系統</h1>
    <p id="sidebar-schedule-info-mobile">尚未設定班次</p>
  </div>
  <nav class="sidebar-nav" id="mobile-sidebar-nav"></nav>
</div>

<!-- App Shell -->
<div id="app-shell">
  <!-- Desktop Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-brand">
      <h1>天達大班<br>報到系統</h1>
      <p id="sidebar-schedule-info">尚未設定班次</p>
    </div>
    <nav class="sidebar-nav" id="desktop-sidebar-nav"></nav>
    <div class="p-4 text-xs text-white/40 text-center">PWA v1.1</div>
  </aside>

  <!-- Main Area -->
  <div id="main-area">
    <!-- Mobile Header -->
    <header id="mobile-header">
      <button id="menu-btn" onclick="openMobileSidebar()" class="text-white">
        <i class="fa-solid fa-bars"></i>
      </button>
      <div class="flex-1">
        <h2 id="header-title">即時主頁</h2>
      </div>
      <div id="schedule-badge" class="hidden"></div>
    </header>

    <!-- View Container -->
    <main id="app-view"></main>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav">
      <button class="nav-item active" data-tab="home" onclick="Router.navigateTo('dashboard')">
        <i class="fa-solid fa-house"></i><span>主頁</span>
      </button>
      <button class="nav-item" data-tab="scanner" onclick="Router.navigateTo('scanner')">
        <i class="fa-solid fa-qrcode"></i><span>掃描</span>
      </button>
      <button class="nav-item" data-tab="search" onclick="Router.navigateTo('quick-search')">
        <i class="fa-solid fa-magnifying-glass"></i><span>查詢</span>
      </button>
      <button class="nav-item" data-tab="stats" onclick="Router.navigateTo('attendance-stats')">
        <i class="fa-solid fa-chart-bar"></i><span>統計</span>
      </button>
      <button class="nav-item" data-tab="more" onclick="Router.navigateTo('settings')">
        <i class="fa-solid fa-gear"></i><span>設定</span>
      </button>
    </nav>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════ -->
<!-- VIEW TEMPLATES                                                   -->
<!-- ═══════════════════════════════════════════════════════════════ -->

<!-- ── DASHBOARD ─────────────────────────────────── -->
<template id="tpl-dashboard">
  <div class="p-4 space-y-4">
    <div id="dash-setup-prompt" class="setup-prompt hidden">
      <i class="fa-solid fa-triangle-exclamation text-4xl mb-3 opacity-80 block"></i>
      <h3 class="font-bold text-lg mb-1">尚未設定班次</h3>
      <p class="text-white/80 text-sm mb-4">請先設定本次課程資訊，才能使用報到功能</p>
