<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#2F6783">
  <meta name="description" content="天達大班報到系統 - 現代化報到管理 PWA">
  <title>天達大班報到系統</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: "#2F6783", light: "#3d8aa8", dark: "#1e4d63", xdark: "#12303f" },
            success: "#10B97A", warning: "#FBBF24", danger: "#F0554C"
          },
          fontFamily: { sans: ["Inter","Noto Sans TC","sans-serif"] }
        }
      }
    }
  </script>
  <style>
    :root { --safe-bottom: env(safe-area-inset-bottom, 0px); }
    html, body { height: 100%; font-family: "Inter","Noto Sans TC",sans-serif; }
    body { background: #f0f4f8; overflow: hidden; }

    /* App Shell */
    #app-shell { display: flex; height: 100vh; height: 100dvh; overflow: hidden; }

    /* Sidebar (desktop) */
    #sidebar { width: 240px; background: linear-gradient(180deg,#2F6783 0%,#1e4d63 100%); color: white; flex-shrink: 0; display: flex; flex-direction: column; overflow-y: auto; }
    @media(max-width:767px){ #sidebar { display:none; } }
    .sidebar-brand { padding: 24px 20px 16px; border-bottom: 1px solid rgba(255,255,255,.15); }
    .sidebar-brand h1 { font-size: 1.1rem; font-weight: 700; line-height: 1.3; }
    .sidebar-brand p { font-size: 0.75rem; opacity: .7; margin-top: 2px; }
    .sidebar-nav { padding: 12px 0; flex: 1; }
    .sidebar-item { display: flex; align-items: center; gap: 12px; padding: 11px 20px; color: rgba(255,255,255,.75); font-size: .875rem; cursor: pointer; transition: all .15s; border-left: 3px solid transparent; }
    .sidebar-item:hover { background: rgba(255,255,255,.1); color: white; }
    .sidebar-item.active { background: rgba(255,255,255,.15); color: white; border-left-color: white; font-weight: 600; }
    .sidebar-item i { width: 20px; text-align: center; font-size: 1rem; }
    .sidebar-divider { height: 1px; background: rgba(255,255,255,.1); margin: 8px 20px; }

    /* Main content area */
    #main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    /* Mobile Header */
    #mobile-header { background: #2F6783; color: white; padding: 0 16px; height: 56px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,.2); }
    #mobile-header h2 { flex: 1; font-size: 1rem; font-weight: 600; }
    #menu-btn { font-size: 1.25rem; cursor: pointer; padding: 8px; }
    @media(min-width:768px){ #mobile-header { display: none; } }

    /* Schedule badge in header */
    #schedule-badge { font-size: .7rem; background: rgba(255,255,255,.2); padding: 2px 8px; border-radius: 99px; white-space: nowrap; }

    /* App view container */
    #app-view { flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: calc(72px + var(--safe-bottom)); }
    @media(min-width:768px){ #app-view { padding-bottom: 16px; } }
    .view-container { animation: fadeIn .2s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

    /* Bottom Nav (mobile) */
    #bottom-nav { background: white; border-top: 1px solid #e5e7eb; display: flex; padding-bottom: var(--safe-bottom); flex-shrink: 0; box-shadow: 0 -2px 12px rgba(0,0,0,.08); }
    @media(min-width:768px){ #bottom-nav { display: none; } }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; padding: 8px 4px; color: #9ca3af; font-size: .65rem; cursor: pointer; transition: color .15s; border: none; background: none; }
    .nav-item.active { color: #2F6783; }
    .nav-item.active i { font-weight: 900; }
    .nav-item i { font-size: 1.25rem; }

    /* Mobile sidebar overlay */
    #mobile-sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:40; }
    #mobile-sidebar-panel { position:fixed; left:-280px; top:0; bottom:0; width:280px; background:linear-gradient(180deg,#2F6783 0%,#1e4d63 100%); z-index:50; transition:left .25s ease; overflow-y:auto; color:white; }
    #mobile-sidebar-panel.open { left:0; }
    #mobile-sidebar-overlay.open { display:block; }

    /* Cards */
    .card { background: white; border-radius: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04); }
    .card-header { padding: 16px 20px 12px; border-bottom: 1px solid #f3f4f6; font-weight: 600; color: #1f2937; display: flex; align-items: center; gap: 8px; }

    /* KPI Cards */
    .kpi-card { background: white; border-radius: 14px; padding: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.06); display: flex; flex-direction: column; gap: 4px; }
    .kpi-value { font-size: 2rem; font-weight: 700; line-height: 1; }
    .kpi-label { font-size: .75rem; color: #6b7280; }

    /* Status badges */
    .badge { display: inline-flex; align-items: center; font-size: .7rem; font-weight: 600; padding: 2px 8px; border-radius: 99px; }
    .badge-present { background: #d1fae5; color: #065f46; }
    .badge-absent { background: #fee2e2; color: #991b1b; }
    .badge-leave { background: #fef3c7; color: #92400e; }
    .badge-late { background: #dbeafe; color: #1e40af; }
    .badge-unknown { background: #f3f4f6; color: #6b7280; }

    /* Member list items */
    .member-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid #f3f4f6; cursor: pointer; transition: background .1s; }
    .member-item:hover { background: #f9fafb; }
    .member-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg,#2F6783,#3d8aa8); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: .875rem; flex-shrink: 0; }

    /* Search input */
    .search-input { width: 100%; padding: 10px 16px 10px 40px; border: 1px solid #e5e7eb; border-radius: 12px; font-size: .9rem; outline: none; background: white; transition: border-color .15s; }
    .search-input:focus { border-color: #2F6783; box-shadow: 0 0 0 3px rgba(47,103,131,.1); }

    /* Buttons */
    .btn-primary { background: #2F6783; color: white; border: none; border-radius: 12px; padding: 12px 24px; font-size: .9rem; font-weight: 600; cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 8px; justify-content: center; }
    .btn-primary:hover { background: #1e4d63; }
    .btn-primary:active { transform: scale(.97); }
    .btn-secondary { background: #f3f4f6; color: #374151; border: none; border-radius: 12px; padding: 10px 20px; font-size: .875rem; font-weight: 500; cursor: pointer; transition: all .15s; }
    .btn-danger { background: #fee2e2; color: #dc2626; border: none; border-radius: 12px; padding: 10px 20px; font-size: .875rem; font-weight: 500; cursor: pointer; }

    /* Toast */
    #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
    .toast { background: #1f2937; color: white; padding: 12px 20px; border-radius: 12px; font-size: .875rem; box-shadow: 0 4px 12px rgba(0,0,0,.2); animation: slideDown .25s ease; pointer-events: auto; display: flex; align-items: center; gap: 10px; }
    .toast.success { background: #065f46; }
    .toast.error { background: #991b1b; }
    @keyframes slideDown { from{opacity:0;transform:translateY(-12px)} to{opacity:1;transform:none} }

    /* Loading overlay */
    #loading-overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,.85); z-index: 100; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
    #loading-overlay.show { display: flex; }
    .spinner { width: 40px; height: 40px; border: 3px solid #e5e7eb; border-top-color: #2F6783; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* Scanner */
    #qr-video { width: 100%; height: 100%; object-fit: cover; }
    .scanner-box { position: relative; width: 240px; height: 240px; margin: 0 auto; }
    .scan-line { position: absolute; left: 10px; right: 10px; height: 2px; background: linear-gradient(90deg, transparent, #2F6783, transparent); animation: scanAnim 2s ease-in-out infinite; }
    @keyframes scanAnim { 0%,100%{top:10px;opacity:.5} 50%{top:calc(100% - 12px);opacity:1} }
    .corner-tl, .corner-tr, .corner-bl, .corner-br { position: absolute; width: 24px; height: 24px; border-color: #2F6783; border-style: solid; }
    .corner-tl { top:0; left:0; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
    .corner-tr { top:0; right:0; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
    .corner-bl { bottom:0; left:0; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
    .corner-br { bottom:0; right:0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

    /* Large text mode */
    body.large-text .member-item { padding: 16px; }
    body.large-text .member-item .text-sm { font-size: 1rem !important; }
    body.large-text .member-item .text-base { font-size: 1.125rem !important; }
    body.large-text .member-avatar { width: 48px; height: 48px; font-size: 1rem; }

    /* Checkin checkbox */
    .checkin-check { width: 28px; height: 28px; border-radius: 8px; border: 2px solid #d1d5db; background: white; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .15s; flex-shrink: 0; }
    .checkin-check.checked { background: #2F6783; border-color: #2F6783; color: white; }

    /* Progress bar */
    .progress-bar { height: 8px; background: #e5e7eb; border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #2F6783, #3d8aa8); border-radius: 99px; transition: width .5s ease; }

    /* Section headers */
    .section-title { font-size: .75rem; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: .05em; padding: 12px 16px 6px; }

    /* Tabs */
    .tab-bar { display: flex; border-bottom: 2px solid #e5e7eb; background: white; }
    .tab-btn { flex: 1; padding: 12px 8px; font-size: .875rem; font-weight: 500; color: #6b7280; border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .15s; }
    .tab-btn.active { color: #2F6783; border-bottom-color: #2F6783; font-weight: 600; }

    /* Setup prompt */
    .setup-prompt { background: linear-gradient(135deg,#2F6783,#1e4d63); color: white; border-radius: 16px; padding: 24px; margin: 16px; text-align: center; }
  </style>
</head>
<body>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- Loading overlay -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <p class="text-gray-500 text-sm">載入中...</p>
</div>

<!-- Mobile Sidebar Overlay -->
<div id="mobile-sidebar-overlay" onclick="closeMobileSidebar()"></div>
<div id="mobile-sidebar-panel">
  <div class="sidebar-brand">
    <h1>天達大班報到系統</h1>
    <p id="sidebar-schedule-info-mobile">尚未設定班次</p>
  </div>
  <nav class="sidebar-nav" id="mobile-sidebar-nav">
    <!-- populated by JS -->
  </nav>
</div>

<!-- App Shell -->
<div id="app-shell">
  <!-- Desktop Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-brand">
      <h1>天達大班<br>報到系統</h1>
      <p id="sidebar-schedule-info">尚未設定班次</p>
    </div>
    <nav class="sidebar-nav" id="desktop-sidebar-nav">
      <!-- populated by JS -->
    </nav>
    <div class="p-4 text-xs text-white/40 text-center">PWA v1.0</div>
  </aside>

  <!-- Main Area -->
  <div id="main-area">
    <!-- Mobile Header -->
    <header id="mobile-header">
      <button id="menu-btn" onclick="openMobileSidebar()" class="text-white">
        <i class="fa-solid fa-bars"></i>
      </button>
      <div class="flex-1">
        <h2 id="header-title">即時主頁</h2>
      </div>
      <div id="schedule-badge" class="hidden"></div>
    </header>

    <!-- View Container -->
    <main id="app-view"></main>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav">
      <button class="nav-item active" data-tab="home" onclick="Router.navigateTo('dashboard')">
        <i class="fa-solid fa-house"></i><span>主頁</span>
      </button>
      <button class="nav-item" data-tab="scanner" onclick="Router.navigateTo('scanner')">
        <i class="fa-solid fa-qrcode"></i><span>掃描</span>
      </button>
      <button class="nav-item" data-tab="search" onclick="Router.navigateTo('quick-search')">
        <i class="fa-solid fa-magnifying-glass"></i><span>查詢</span>
      </button>
      <button class="nav-item" data-tab="stats" onclick="Router.navigateTo('attendance-stats')">
        <i class="fa-solid fa-chart-bar"></i><span>統計</span>
      </button>
      <button class="nav-item" data-tab="more" onclick="Router.navigateTo('settings')">
        <i class="fa-solid fa-gear"></i><span>設定</span>
      </button>
    </nav>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════ -->
<!-- VIEW TEMPLATES                                                  -->
<!-- ═══════════════════════════════════════════════════════════════ -->

<!-- DASHBOARD -->
<template id="tpl-dashboard">
  <div class="p-4 space-y-4">
    <div id="dash-setup-prompt" class="setup-prompt hidden">
      <i class="fa-solid fa-triangle-exclamation text-3xl mb-3 opacity-80"></i>
      <h3 class="font-bold text-lg mb-1">尚未設定班次</h3>
      <p class="text-white/80 text-sm mb-4">請先設定本次課程資訊，才能使用報到功能</p>
      <button onclick="Router.navigateTo('settings')" class="btn-primary bg-white text-brand w-full">
        <i class="fa-solid fa-gear"></i> 前往工具設定
      </button>
    </div>
    <div id="dash-schedule-card" class="card p-4 hidden">
      <div class="flex items-start justify-between">
        <div>
          <p class="text-xs text-gray-500 mb-1">當次班程</p>
          <h3 id="dash-schedule-title" class="text-lg font-bold text-gray-800"></h3>
          <p id="dash-schedule-date" class="text-sm text-gray-500 mt-1"></p>
        </div>
        <span id="dash-mode-badge" class="badge badge-present text-xs"></span>
      </div>
    </div>
    <div id="dash-kpi-row" class="grid grid-cols-2 gap-3 hidden">
      <div class="kpi-card border-l-4 border-brand">
        <div id="kpi-present" class="kpi-value text-brand">--</div>
        <div class="kpi-label">已報到</div>
      </div>
      <div class="kpi-card border-l-4 border-gray-300">
        <div id="kpi-absent" class="kpi-value text-gray-500">--</div>
        <div class="kpi-label">未報到</div>
      </div>
      <div class="kpi-card border-l-4 border-warning">
        <div id="kpi-leave" class="kpi-value text-yellow-600">--</div>
        <div class="kpi-label">請假</div>
      </div>
      <div class="kpi-card border-l-4 border-blue-400">
        <div id="kpi-rate" class="kpi-value text-blue-600">--%</div>
        <div class="kpi-label">出席率</div>
      </div>
    </div>
    <div id="dash-progress-card" class="card p-4 hidden">
      <div class="flex justify-between text-sm mb-2">
        <span class="font-medium text-gray-700">出席進度</span>
        <span id="dash-progress-text" class="text-gray-500"></span>
      </div>
      <div class="progress-bar">
        <div id="dash-progress-fill" class="progress-fill" style="width:0%"></div>
      </div>
    </div>
    <div class="card hidden" id="dash-actions">
      <div class="card-header"><i class="fa-solid fa-bolt text-brand"></i> 快速操作</div>
      <div class="p-4 grid grid-cols-2 gap-3">
        <button onclick="Router.navigateTo('scanner')" class="btn-primary text-sm py-3">
          <i class="fa-solid fa-qrcode"></i> QR 掃描
        </button>
        <button onclick="Router.navigateTo('manual-checkin')" class="btn-primary text-sm py-3">
          <i class="fa-solid fa-list-check"></i> 簡易報到
        </button>
        <button onclick="Router.navigateTo('quick-search')" class="btn-secondary text-sm py-3">
          <i class="fa-solid fa-magnifying-glass"></i> 快速查詢
        </button>
        <button onclick="Router.navigateTo('attendance-stats')" class="btn-secondary text-sm py-3">
          <i class="fa-solid fa-chart-bar"></i> 出席統計
        </button>
      </div>
    </div>
    <div id="dash-by-unit" class="card hidden">
      <div class="card-header"><i class="fa-solid fa-map-marker-alt text-brand"></i> 各區出席</div>
      <div id="dash-unit-list" class="divide-y divide-gray-100"></div>
    </div>
    <p id="dash-updated" class="text-xs text-center text-gray-400"></p>
  </div>
</template>

<!-- SCANNER -->
<template id="tpl-scanner">
  <div class="flex flex-col" style="min-height:calc(100vh - 130px)">
    <div class="p-4 space-y-3">
      <div id="scanner-setup-warn" class="hidden setup-prompt">
        <i class="fa-solid fa-triangle-exclamation text-2xl mb-2"></i>
        <p class="font-semibold mb-2">尚未設定班次</p>
        <button onclick="Router.navigateTo('settings')" class="btn-primary bg-white text-brand w-full text-sm">前往設定</button>
      </div>
      <div id="scanner-main" class="hidden space-y-3">
        <div class="card overflow-hidden">
          <div class="relative bg-black" style="height:260px">
            <div id="reader" style="width:100%;height:100%"></div>
            <div class="scanner-box absolute" style="top:50%;left:50%;transform:translate(-50%,-50%)">
              <div class="corner-tl"></div><div class="corner-tr"></div>
              <div class="corner-bl"></div><div class="corner-br"></div>
              <div class="scan-line"></div>
            </div>
          </div>
          <div class="p-3 flex gap-2">
            <button id="btn-flashlight" class="btn-secondary flex-1 py-2 text-sm" onclick="toggleFlashlight()">
              <i class="fa-solid fa-bolt"></i> 手電筒
            </button>
            <button class="btn-secondary flex-1 py-2 text-sm" onclick="switchCamera()">
              <i class="fa-solid fa-rotate"></i> 換鏡頭
            </button>
          </div>
        </div>
        <div id="scanner-result" class="card p-4 hidden"></div>
        <div class="card p-4">
          <p class="text-sm font-medium text-gray-700 mb-2">手動輸入 ID</p>
          <div class="flex gap-2">
            <input type="text" id="manual-id-input" placeholder="輸入班員編號" class="search-input flex-1 pl-4">
            <button onclick="manualLookup()" class="btn-primary px-4 py-2 text-sm">查詢</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</template>

<!-- MANUAL CHECKIN -->
<template id="tpl-manual-checkin">
  <div class="flex flex-col" style="min-height:calc(100vh - 130px)">
    <div class="p-4 space-y-3">
      <div class="card p-3">
        <div class="flex gap-2 mb-2">
          <div class="relative flex-1">
            <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="text" id="mc-search" placeholder="搜尋姓名…" class="search-input w-full" oninput="filterMemberList()">
          </div>
          <button onclick="toggleLargeText()" id="mc-large-btn" class="btn-secondary px-3 py-2 text-sm" title="大字版">
            <i class="fa-solid fa-text-height"></i>
          </button>
        </div>
        <div class="flex gap-2 flex-wrap">
          <select id="mc-filter-unit" onchange="filterMemberList()" class="text-xs border border-gray-200 rounded-lg px-2 py-1 bg-white">
            <option value="">所有區別</option>
          </select>
          <select id="mc-filter-status" onchange="filterMemberList()" class="text-xs border border-gray-200 rounded-lg px-2 py-1 bg-white">
            <option value="">所有狀態</option>
            <option value="unchecked">未報到</option>
            <option value="checked">已報到</option>
            <option value="leave">請假</option>
          </select>
        </div>
      </div>
      <div class="flex justify-between items-center px-1">
        <p id="mc-count" class="text-sm text-gray-500"></p>
        <div class="flex gap-2 items-center">
          <span id="mc-selected-count" class="text-sm font-medium text-brand hidden"></span>
          <button id="mc-submit-btn" onclick="submitCheckins()" class="btn-primary text-sm px-4 py-2 hidden">
            <i class="fa-solid fa-paper-plane"></i> 送出報到
          </button>
        </div>
      </div>
      <div id="mc-member-list" class="card divide-y divide-gray-100">
        <div class="p-8 text-center text-gray-400"><div class="spinner mx-auto mb-3"></div>載入中…</div>
      </div>
      <div class="card p-3">
        <p class="text-sm font-medium text-gray-700 mb-2"><i class="fa-solid fa-user-plus text-brand"></i> 臨時報到</p>
        <div class="flex gap-2">
          <input type="text" id="temp-name" placeholder="臨時來賓姓名" class="search-input flex-1 pl-4">
          <button onclick="submitTempCheckin()" class="btn-primary px-4 text-sm">報到</button>
        </div>
      </div>
    </div>
  </div>
</template>

<!-- QUICK SEARCH -->
<template id="tpl-quick-search">
  <div class="p-4 space-y-3">
    <div class="relative">
      <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
      <input type="text" id="qs-input" placeholder="輸入姓名或編號搜尋…" class="search-input w-full text-base"
        oninput="quickSearch(this.value)" autofocus>
    </div>
    <div id="qs-filters" class="flex gap-2 flex-wrap">
      <select id="qs-filter-unit" onchange="quickSearch(document.getElementById('qs-input').value)" class="text-xs border border-gray-200 rounded-lg px-3 py-2 bg-white">
        <option value="">所有區別</option>
      </select>
      <select id="qs-filter-status" onchange="quickSearch(document.getElementById('qs-input').value)" class="text-xs border border-gray-200 rounded-lg px-3 py-2 bg-white">
        <option value="">所有狀態</option>
        <option value="present">已報到</option>
        <option value="absent">未報到</option>
        <option value="leave">請假</option>
      </select>
    </div>
    <div id="qs-results" class="card divide-y divide-gray-100">
      <div class="p-8 text-center text-gray-400"><i class="fa-solid fa-magnifying-glass text-3xl mb-2 block opacity-30"></i>輸入姓名開始搜尋</div>
    </div>
  </div>
</template>

<!-- MEMBER LIST -->
<template id="tpl-member-list">
  <div class="p-4 space-y-3">
    <div class="relative">
      <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
      <input type="text" id="ml-search" placeholder="搜尋班員…" class="search-input w-full" oninput="filterMemberListView()">
    </div>
    <div class="flex gap-2">
      <select id="ml-unit" onchange="filterMemberListView()" class="text-xs border border-gray-200 rounded-lg px-3 py-2 bg-white flex-1">
        <option value="">所有區別</option>
      </select>
      <select id="ml-class" onchange="filterMemberListView()" class="text-xs border border-gray-200 rounded-lg px-3 py-2 bg-white flex-1">
        <option value="">所有班別</option>
      </select>
    </div>
    <p id="ml-count" class="text-xs text-gray-500 px-1"></p>
    <div id="ml-list" class="card divide-y divide-gray-100">
      <div class="p-8 text-center text-gray-400"><div class="spinner mx-auto mb-3"></div>載入中…</div>
    </div>
  </div>
</template>

<!-- MEMBER DETAIL -->
<template id="tpl-member-detail">
  <div>
    <div id="md-header" class="bg-gradient-to-b from-brand to-brand-dark text-white p-6 text-center">
      <div id="md-avatar" class="w-20 h-20 rounded-full bg-white/20 flex items-center justify-center text-2xl font-bold mx-auto mb-3"></div>
      <h2 id="md-name" class="text-2xl font-bold"></h2>
      <p id="md-id" class="text-white/70 text-sm mt-1"></p>
      <div class="flex justify-center gap-4 mt-4 text-sm">
        <div><div id="md-unit" class="font-semibold"></div><div class="text-white/60 text-xs">區別</div></div>
        <div class="w-px bg-white/20"></div>
        <div><div id="md-class" class="font-semibold"></div><div class="text-white/60 text-xs">班級</div></div>
        <div class="w-px bg-white/20"></div>
        <div><div id="md-gender" class="font-semibold"></div><div class="text-white/60 text-xs">乾坤</div></div>
      </div>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" data-tab-target="md-basic" onclick="switchMdTab(this)">基本資料</button>
      <button class="tab-btn" data-tab-target="md-history" onclick="switchMdTab(this)">出席歷程</button>
    </div>
    <div id="md-basic" class="p-4 space-y-3">
      <div class="card divide-y divide-gray-100">
        <div class="flex p-3 gap-4"><span class="text-gray-500 text-sm w-20">特殊註記</span><span id="md-note" class="text-sm font-medium"></span></div>
        <div class="flex p-3 gap-4"><span class="text-gray-500 text-sm w-20">組別</span><span id="md-group" class="text-sm font-medium"></span></div>
        <div class="flex p-3 gap-4"><span class="text-gray-500 text-sm w-20">QR Code</span>
          <div id="md-qr-area"><a id="md-qr-link" href="#" target="_blank" class="text-brand text-sm underline">查看 QR Code</a></div>
        </div>
        <div class="flex p-3 gap-4"><span class="text-gray-500 text-sm w-20">備註</span><span id="md-remarks" class="text-sm"></span></div>
      </div>
      <button id="md-checkin-btn" onclick="checkinThisMember()" class="btn-primary w-full hidden">
        <i class="fa-solid fa-check-circle"></i> 為此班員報到
      </button>
    </div>
    <div id="md-history" class="hidden p-4">
      <div id="md-history-list" class="space-y-2">
        <div class="p-8 text-center text-gray-400"><div class="spinner mx-auto mb-3"></div>載入中…</div>
      </div>
    </div>
  </div>
</template>

<!-- CLASS VIEW -->
<template id="tpl-class-view">
  <div class="p-4 space-y-3">
    <div class="card p-3 flex gap-2">
      <div class="relative flex-1">
        <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
        <input type="text" id="cv-search" placeholder="搜尋班員…" class="search-input" oninput="filterClassView()">
      </div>
    </div>
    <div id="cv-class-list" class="space-y-3">
      <div class="p-8 text-center text-gray-400"><div class="spinner mx-auto mb-3"></div>載入中…</div>
    </div>
  </div>
</template>

<!-- ATTENDANCE STATS -->
<template id="tpl-attendance-stats">
  <div class="p-4 space-y-4">
    <div id="stats-no-schedule" class="setup-prompt hidden">
      <i class="fa-solid fa-chart-bar text-3xl mb-2"></i>
      <p class="font-semibold">尚未設定班次</p>
      <button onclick="Router.navigateTo('settings')" class="btn-primary bg-white text-brand w-full mt-3 text-sm">前往設定</button>
    </div>
    <div id="stats-main" class="hidden space-y-4">
      <div class="grid grid-cols-2 gap-3">
        <div class="kpi-card border-l-4 border-brand col-span-2">
          <div class="flex justify-between items-start">
            <div><div id="stats-present" class="kpi-value text-brand">--</div><div class="kpi-label">已出席</div></div>
            <div class="text-right"><div id="stats-rate" class="text-2xl font-bold text-brand">--%</div><div class="kpi-label">出席率</div></div>
          </div>
          <div class="progress-bar mt-2"><div id="stats-fill" class="progress-fill" style="width:0%"></div></div>
        </div>
        <div class="kpi-card"><div id="stats-male" class="kpi-value text-blue-600">--</div><div class="kpi-label">乾 (男)</div></div>
        <div class="kpi-card"><div id="stats-female" class="kpi-value text-pink-500">--</div><div class="kpi-label">坤 (女)</div></div>
        <div class="kpi-card"><div id="stats-leave" class="kpi-value text-yellow-600">--</div><div class="kpi-label">請假</div></div>
        <div class="kpi-card"><div id="stats-absent" class="kpi-value text-gray-500">--</div><div class="kpi-label">未報到</div></div>
      </div>
      <div class="card">
        <div class="card-header"><i class="fa-solid fa-map-marker-alt text-brand"></i> 各區出席狀況</div>
        <div id="stats-unit-list" class="divide-y divide-gray-100 p-4 space-y-3"></div>
      </div>
    </div>
  </div>
</template>

<!-- CLASS SCHEDULE -->
<template id="tpl-class-schedule">
  <div class="p-4 space-y-3">
    <div class="card p-3 flex gap-2">
      <select id="cs-filter" onchange="loadScheduleView()" class="text-sm border border-gray-200 rounded-lg px-3 py-2 bg-white flex-1">
        <option value="all">所有班程</option>
        <option value="future">未來班程</option>
        <option value="past">過去班程</option>
      </select>
    </div>
    <div id="cs-list" class="space-y-2">
      <div class="p-8 text-center text-gray-400"><div class="spinner mx-auto mb-3"></div>載入中…</div>
    </div>
  </div>
</template>

<!-- SETTINGS -->
<template id="tpl-settings">
  <div class="p-4 space-y-4">
    <div class="card">
      <div class="card-header"><i class="fa-solid fa-calendar-check text-brand"></i> 班程設定</div>
      <div class="p-4 space-y-3">
        <div>
          <label class="text-sm font-medium text-gray-700 block mb-1">從系統取得當前班程</label>
          <button onclick="fetchActiveSchedule()" class="btn-secondary w-full text-sm py-2">
            <i class="fa-solid fa-cloud-arrow-down"></i> 自動填入
          </button>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-xs text-gray-500 block mb-1">班程日期</label>
            <input type="date" id="st-date" class="w-full border border-gray-200 rounded-xl p-2 text-sm">
          </div>
          <div>
            <label class="text-xs text-gray-500 block mb-1">班別代碼</label>
            <input type="text" id="st-classcode" placeholder="如：1" class="w-full border border-gray-200 rounded-xl p-2 text-sm">
          </div>
        </div>
        <div>
          <label class="text-xs text-gray-500 block mb-1">班別名稱 (顯示用)</label>
          <input type="text" id="st-classname" placeholder="如：明理班" class="w-full border border-gray-200 rounded-xl p-2 text-sm">
        </div>
        <div>
          <label class="text-xs text-gray-500 block mb-1">驗證密碼 (CheckPassToday)</label>
          <input type="text" id="st-verify" placeholder="今日驗證密碼" class="w-full border border-gray-200 rounded-xl p-2 text-sm">
        </div>
        <div>
          <label class="text-xs text-gray-500 block mb-1">出勤方式</label>
          <div class="flex gap-2">
            <button id="btn-mode-physical" onclick="setMode('實體')" class="flex-1 py-2 text-sm rounded-xl border-2 border-brand bg-brand text-white font-medium">實體</button>
            <button id="btn-mode-online" onclick="setMode('線上')" class="flex-1 py-2 text-sm rounded-xl border-2 border-gray-200 text-gray-600 font-medium">線上</button>
          </div>
        </div>
        <button onclick="saveSettings()" class="btn-primary w-full">
          <i class="fa-solid fa-floppy-disk"></i> 儲存設定
        </button>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><i class="fa-solid fa-sliders text-brand"></i> 應用設定</div>
      <div class="divide-y divide-gray-100">
        <div class="flex items-center justify-between p-4">
          <div><p class="text-sm font-medium text-gray-700">大字版模式</p><p class="text-xs text-gray-400">簡易報到列表放大字體</p></div>
          <button id="toggle-large-text" onclick="toggleLargeTextSetting()" class="w-12 h-6 rounded-full bg-gray-200 relative transition-colors duration-200">
            <div class="w-5 h-5 rounded-full bg-white shadow-sm absolute top-0.5 left-0.5 transition-transform duration-200"></div>
          </button>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><i class="fa-solid fa-circle-info text-brand"></i> 目前設定</div>
      <div id="current-settings-display" class="p-4 space-y-2 text-sm text-gray-600"></div>
    </div>
    <div class="card">
      <div class="card-header"><i class="fa-solid fa-database text-brand"></i> 資料管理</div>
      <div class="p-4 flex gap-2">
        <button onclick="State.clearMemberCache(); showToast('班員快取已清除','success')" class="btn-secondary text-sm flex-1">
          <i class="fa-solid fa-trash-can"></i> 清除快取
        </button>
        <button onclick="Router.navigateTo('class-schedule')" class="btn-secondary text-sm flex-1">
          <i class="fa-solid fa-calendar"></i> 班程資料
        </button>
      </div>
    </div>
  </div>
</template>

<!-- ═══════════════════════════════════════════════════════════════ -->

<script src="js/state.js"></script>

<script src="js/app.js"></script>
