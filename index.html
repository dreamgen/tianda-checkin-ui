<!DOCTYPE html>
<html lang="zh-Hant" class="antialiased text-gray-900 bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#2F6783">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./assets/icon-192.png">
    
    <title>天達大班報到系統</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { DEFAULT: '#2F6783', dark: '#1D4D63', light: '#E0EDF5' },
                        success: '#10B97A', warning: '#FBBF24', danger: '#F0554C', neutral: '#8F8F8F'
                    }
                }
            }
        }
    </script>
    
    <!-- Google Fonts & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- QR Scanner JS -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 0px); }
    </style>
</head>
<body class="h-screen w-full overflow-hidden flex flex-col md:flex-row bg-[#F5F7FA]">

    <!-- Desktop Sidebar -->
    <aside class="hidden md:flex flex-col w-64 h-full bg-white border-r border-gray-200 flex-shrink-0 z-20">
        <div class="p-4 border-b border-gray-100 flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-primary text-white flex items-center justify-center font-bold">天</div>
            <h1 class="font-bold text-lg text-gray-800">大班報到系統</h1>
        </div>
        
        <div class="flex-1 overflow-y-auto pt-4 pb-20 no-scrollbar px-3 space-y-1 nav-links">
            <a href="#" class="sidebar-item nav-link active flex items-center gap-3 px-3 py-2 text-sm font-medium" data-target="dashboard">
                <i class="fa-solid fa-house w-5 text-center"></i>
                即時檢視 (主頁)
            </a>
            
            <div class="pt-4 pb-1">
                <p class="px-3 text-xs font-semibold text-gray-400 uppercase tracking-wider">報到作業</p>
            </div>
            <a href="#" class="sidebar-item nav-link flex items-center gap-3 px-3 py-2 text-sm font-medium" data-target="scanner">
                <i class="fa-solid fa-qrcode w-5 text-center"></i>
                掃描名牌QRCODE
            </a>
            <a href="#" class="sidebar-item nav-link flex items-center gap-3 px-3 py-2 text-sm font-medium" data-target="manual-checkin">
                <i class="fa-solid fa-list-check w-5 text-center"></i>
                簡易報到
            </a>
            
            <div class="pt-4 pb-1">
                <p class="px-3 text-xs font-semibold text-gray-400 uppercase tracking-wider">人員與資料</p>
            </div>
            <a href="#" class="sidebar-item nav-link flex items-center gap-3 px-3 py-2 text-sm font-medium" data-target="member-list">
                <i class="fa-solid fa-users w-5 text-center"></i>
                班員資料
            </a>
            <a href="#" class="sidebar-item nav-link flex items-center gap-3 px-3 py-2 text-sm font-medium" data-target="class-view">
                <i class="fa-solid fa-sitemap w-5 text-center"></i>
                分班檢視
            </a>
            <a href="#" class="sidebar-item nav-link flex items-center gap-3 px-3 py-2 text-sm font-medium" data-target="quick-search">
                <i class="fa-solid fa-magnifying-glass w-5 text-center"></i>
                快速查詢
            </a>
            
            <div class="pt-4 pb-1">
                <p class="px-3 text-xs font-semibold text-gray-400 uppercase tracking-wider">統計與報表</p>
            </div>
            <a href="#" class="sidebar-item nav-link flex items-center gap-3 px-3 py-2 text-sm font-medium" data-target="attendance-stats">
                <i class="fa-solid fa-chart-pie w-5 text-center"></i>
                出席統計
            </a>
            
            <div class="pt-4 pb-1">
                <p class="px-3 text-xs font-semibold text-gray-400 uppercase tracking-wider">系統管理</p>
            </div>
            <a href="#" class="sidebar-item nav-link flex items-center gap-3 px-3 py-2 text-sm font-medium" data-target="class-schedule">
                <i class="fa-regular fa-calendar-days w-5 text-center"></i>
                班程資料
            </a>
            <a href="#" class="sidebar-item nav-link flex items-center gap-3 px-3 py-2 text-sm font-medium" data-target="settings">
                <i class="fa-solid fa-gear w-5 text-center"></i>
                工具設定
            </a>
        </div>
        
        <div class="p-4 border-t border-gray-100 mt-auto">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center overflow-hidden">
                    <i class="fa-solid fa-user text-gray-500"></i>
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-gray-900 truncate">系統招待員</p>
                    <p class="text-xs text-gray-500 truncate" id="sidebar-role">Admin</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content Area -->
    <div class="flex-1 flex flex-col h-full overflow-hidden relative w-full">
        <!-- Mobile Header -->
        <header class="md:hidden bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between z-10 sticky top-0 justify-center">
            <h1 id="header-title" class="text-lg font-bold text-gray-800 absolute left-1/2 transform -translate-x-1/2">報到系統</h1>
            <div class="flex-1"></div>
            <div class="w-8 h-8 rounded-full bg-gray-200 flex justify-center items-center overflow-hidden text-gray-500 text-sm">
                <i class="fa-solid fa-user"></i>
            </div>
        </header>

        <!-- View Container -->
        <main id="app-view" class="flex-1 overflow-y-auto p-4 md:p-8 pb-24 md:pb-8 w-full max-w-full relative">
            <!-- Initial Loading State -->
            <div class="flex flex-col items-center justify-center h-full text-gray-400">
                <i class="fa-solid fa-circle-notch fa-spin text-4xl mb-4 text-primary"></i>
                <p>載入中...</p>
            </div>
        </main>
    </div>

    <!-- Mobile Bottom Navigation -->
    <nav class="md:hidden fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 px-2 py-1 flex justify-between items-center z-50 pb-safe nav-links">
        <a href="#" class="nav-item nav-link active flex flex-col items-center justify-center w-1/5 py-2" data-target="dashboard">
            <i class="fa-solid fa-house mb-1 text-lg"></i>
            <span class="text-[10px] font-medium">主頁</span>
        </a>
        <a href="#" class="nav-item nav-link flex flex-col items-center justify-center w-1/5 py-2" data-target="scanner">
            <i class="fa-solid fa-qrcode mb-1 text-lg"></i>
            <span class="text-[10px] font-medium">掃描</span>
        </a>
        <a href="#" class="nav-item nav-link flex flex-col items-center justify-center w-1/5 py-2" data-target="manual-checkin">
            <i class="fa-solid fa-list-check mb-1 text-lg"></i>
            <span class="text-[10px] font-medium">報到</span>
        </a>
        <a href="#" class="nav-item nav-link flex flex-col items-center justify-center w-1/5 py-2" data-target="quick-search">
            <i class="fa-solid fa-magnifying-glass mb-1 text-lg"></i>
            <span class="text-[10px] font-medium">查詢</span>
        </a>
        <a href="#" class="nav-item nav-link flex flex-col items-center justify-center w-1/5 py-2" data-target="settings">
            <i class="fa-solid fa-ellipsis mb-1 text-lg"></i>
            <span class="text-[10px] font-medium">更多</span>
        </a>
    </nav>

    <!-- Templates for Views -->
    <!-- (To be injected with HTML chunks for each page) -->
    
    <template id="tpl-dashboard">
        <div class="fade-in max-w-4xl mx-auto">
            <h2 class="text-2xl font-bold mb-6 text-gray-800 hidden md:block">即時報到檢視</h2>
            <div class="card p-6 mb-6">
                <!-- content to be implemented -->
                <div id="dashboard-schedule-info" class="mb-6 card p-4 flex flex-col md:flex-row md:items-center justify-between gap-4 border-l-4 border-primary bg-blue-50">
                    <div>
                       <p class="text-sm text-gray-500 font-medium">當次報到班程</p>
                       <h3 class="text-xl font-bold text-primary" id="db-schedule-title">載入中...</h3>
                    </div>
                    <button class="btn-primary px-4 py-2 rounded-md font-medium text-sm shadow-sm" onclick="router.navigate('settings')">
                        更改設定
                    </button>
                </div>
    
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                    <div class="card p-4 text-center">
                        <p class="text-xs text-gray-500 mb-1">報到總數</p>
                        <p class="text-3xl font-bold text-gray-800" id="db-stat-present">-</p>
                        <p class="text-xs text-gray-400 mt-1">/ 總應到 <span id="db-stat-total">-</span></p>
                    </div>
                    <div class="card p-4 text-center">
                        <p class="text-xs text-gray-500 mb-1">出席率</p>
                        <p class="text-3xl font-bold text-primary" id="db-stat-rate">-</p>
                    </div>
                    <div class="card p-4 text-center">
                        <p class="text-xs text-gray-500 mb-1">乾道出席</p>
                        <p class="text-3xl font-bold text-blue-600" id="db-stat-male">-</p>
                    </div>
                    <div class="card p-4 text-center">
                        <p class="text-xs text-gray-500 mb-1">坤道出席</p>
                        <p class="text-3xl font-bold text-pink-600" id="db-stat-female">-</p>
                    </div>
                </div>
                
                <div class="flex gap-4">
                    <button class="flex-1 card p-4 flex flex-col items-center justify-center gap-2 hover:bg-gray-50 transition-colors" onclick="router.navigate('scanner')">
                        <div class="w-12 h-12 rounded-full bg-primary text-white flex items-center justify-center text-xl shadow-md">
                            <i class="fa-solid fa-qrcode"></i>
                        </div>
                        <span class="font-medium text-gray-800">掃描報到</span>
                    </button>
                    <button class="flex-1 card p-4 flex flex-col items-center justify-center gap-2 hover:bg-gray-50 transition-colors" onclick="router.navigate('manual-checkin')">
                        <div class="w-12 h-12 rounded-full bg-success text-white flex items-center justify-center text-xl shadow-md">
                            <i class="fa-solid fa-list-check"></i>
                        </div>
                        <span class="font-medium text-gray-800">簡易報到</span>
                    </button>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-scanner">
        <div class="fade-in max-w-lg mx-auto flex flex-col items-center h-full">
            <h2 class="text-2xl font-bold mb-4 text-gray-800 hidden md:block">QR Code 報到</h2>
            <div id="qr-reader" class="w-full max-w-sm rounded-lg overflow-hidden shadow-lg border-2 border-primary mb-4 bg-black"></div>
            <div id="qr-result" class="w-full mb-4">
                <div class="card p-4 text-center">
                    <p class="text-gray-500 font-medium mb-2">等待掃描...</p>
                    <i class="fa-solid fa-camera text-4xl text-gray-300"></i>
                </div>
            </div>
            
            <button id="btn-fallback-input" class="text-primary underline text-sm font-medium mt-auto mb-4">
                無法掃描？改用手動輸入
            </button>
            
            <!-- Fallback Input Dialog -->
            <div id="dialog-fallback" class="hidden fixed inset-0 bg-black bg-opacity-50 z-[60] flex items-center justify-center p-4">
                <div class="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm">
                    <h3 class="text-lg font-bold mb-4">手動輸入報到序號</h3>
                    <input type="text" id="input-member-id" placeholder="輸入名牌下方 ID" class="w-full border border-gray-300 rounded-md px-3 py-2 mb-4 text-center text-lg tracking-widest focus:outline-none focus:ring-2 focus:ring-primary">
                    <div class="flex gap-3">
                        <button id="btn-cancel-fallback" class="flex-1 py-2 rounded-md font-medium text-gray-600 bg-gray-100">取消</button>
                        <button id="btn-submit-fallback" class="flex-1 py-2 rounded-md font-medium text-white bg-primary">確定報到</button>
                    </div>
                </div>
            </div>
            
            <!-- Confirmation Dialog -->
            <div id="dialog-confirm" class="hidden fixed inset-0 bg-black bg-opacity-50 z-[60] flex items-center justify-center p-4">
                <div class="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm text-center">
                    <div class="w-16 h-16 rounded-full bg-success text-white flex items-center justify-center text-3xl mx-auto mb-4">
                        <i class="fa-solid fa-check"></i>
                    </div>
                    <h3 class="text-xl font-bold text-gray-800 mb-1" id="confirm-name">王大明</h3>
                    <p class="text-gray-500 mb-6" id="confirm-class">ID: ...</p>
                    <button id="btn-next-scan" class="w-full py-3 rounded-md font-medium text-white bg-primary">
                        下一位
                    </button>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-manual-checkin">
        <div class="fade-in max-w-4xl mx-auto h-full flex flex-col pl-1 pr-1">
            <h2 class="text-2xl font-bold mb-4 text-gray-800 hidden md:block">簡易報到</h2>
            
            <div class="card p-4 mb-4 z-10 md:relative">
                <div class="flex gap-2 mb-3">
                    <div class="relative flex-1">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa-solid fa-search text-gray-400"></i>
                        </div>
                        <input type="text" id="mc-search" class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary" placeholder="經理、名字或電話...">
                    </div>
                </div>
                
                <div class="flex overflow-x-auto no-scrollbar gap-2 pb-1" id="mc-filters">
                    <button class="badge badge-primary flex-shrink-0 cursor-pointer shadow-sm filter-btn" data-filter="all">全部 (0)</button>
                    <button class="badge badge-neutral flex-shrink-0 cursor-pointer shadow-sm filter-btn" data-filter="pending">未簽 (0)</button>
                    <button class="badge badge-success flex-shrink-0 cursor-pointer shadow-sm filter-btn" data-filter="checked">已簽 (0)</button>
                    <button class="badge badge-warning flex-shrink-0 cursor-pointer shadow-sm filter-btn" data-filter="temp">臨時 (0)</button>
                </div>
            </div>
            
            <div class="flex-1 overflow-y-auto pb-6" id="mc-list-container">
                <div class="flex flex-col items-center justify-center h-full text-gray-400" id="mc-loading">
                    <i class="fa-solid fa-circle-notch fa-spin text-4xl mb-4 text-primary"></i>
                    <p>載入名單中...</p>
                </div>
                <div class="space-y-3" id="mc-list">
                    <!-- List items generated by JS -->
                </div>
            </div>
            
            <button id="btn-add-temp" class="fixed bottom-20 md:bottom-8 right-4 w-14 h-14 bg-warning text-white rounded-full shadow-lg flex items-center justify-center text-2xl z-40 hover:bg-yellow-500 transition-colors">
                <i class="fa-solid fa-plus"></i>
            </button>
            
            <!-- Add Temp Member Dialog -->
            <div id="dialog-add-temp" class="hidden fixed inset-0 bg-black bg-opacity-50 z-[60] flex justify-center items-center p-4">
                <div class="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm">
                    <h3 class="text-lg font-bold mb-4">新增臨時報到</h3>
                    <div class="space-y-3 mb-4">
                        <input type="text" id="temp-name" placeholder="姓名" class="w-full border border-gray-300 rounded-md px-3 py-2">
                        <input type="text" id="temp-unit" placeholder="區別 (選填)" class="w-full border border-gray-300 rounded-md px-3 py-2">
                    </div>
                    <div class="flex gap-3">
                        <button id="btn-cancel-temp" class="flex-1 py-2 rounded-md font-medium text-gray-600 bg-gray-100">取消</button>
                        <button id="btn-submit-temp" class="flex-1 py-2 rounded-md font-medium text-gray-900 bg-warning">建立並報到</button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-quick-search">
        <div class="fade-in max-w-4xl mx-auto h-full flex flex-col pl-1 pr-1">
            <h2 class="text-2xl font-bold mb-4 text-gray-800 hidden md:block">快速查詢</h2>
            
            <div class="card p-4 mb-4 z-10 sticky top-0 md:relative">
                <div class="relative w-full">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
                    </div>
                    <input type="text" id="qs-search" class="w-full pl-10 pr-10 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary shadow-sm text-lg" placeholder="輸入姓名快速尋找...">
                    <div class="absolute inset-y-0 right-0 pr-3 flex items-center">
                        <button id="qs-clear" class="text-gray-400 hover:text-gray-600 hidden">
                            <i class="fa-solid fa-circle-xmark"></i>
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="flex-1 overflow-y-auto pb-4" id="qs-results-container">
                <div class="flex flex-col items-center justify-center h-40 text-gray-400" id="qs-empty-state">
                    <i class="fa-solid fa-keyboard text-4xl mb-4 text-gray-300"></i>
                    <p>請輸入關鍵字開始查詢</p>
                </div>
                <!-- 查詢結果 -->
                <div class="space-y-3 hidden" id="qs-results">
                </div>
            </div>
            
            <!-- Bottom Sheet / Dialog for individual member detail -->
            <div id="dialog-member-detail" class="hidden fixed inset-0 bg-black bg-opacity-50 z-[60] flex items-end md:items-center justify-center">
                <div class="bg-white rounded-t-2xl md:rounded-xl shadow-2xl w-full md:max-w-md mt-auto md:mt-0 max-h-[90vh] flex flex-col transform transition-transform duration-300 translate-y-0">
                    <div class="p-4 border-b border-gray-100 flex justify-between items-center sticky top-0 bg-white rounded-t-2xl md:rounded-xl z-10">
                        <h3 class="text-lg font-bold">人員詳細資料</h3>
                        <button id="btn-close-detail" class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-500 hover:bg-gray-200">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>
                    <div class="p-6 overflow-y-auto pb-8" id="qs-detail-content">
                        <!-- detail injected here -->
                    </div>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-settings">
        <div class="fade-in max-w-2xl mx-auto">
            <h2 class="text-2xl font-bold mb-6 text-gray-800 hidden md:block">工具設定</h2>
            
            <div class="card p-6 mb-6">
                <h3 class="text-lg font-semibold mb-4 border-b pb-2">當次班程設定</h3>
                <form id="settings-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">班程日期</label>
                        <input type="date" id="setting-date" required class="w-full border border-gray-300 rounded-md px-3 py-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-primary">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">出席模式</label>
                        <select id="setting-mode" class="w-full border border-gray-300 rounded-md px-3 py-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-primary">
                            <option value="實體">實體</option>
                            <option value="線上">線上</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">班別代碼 (例: 1)</label>
                        <input type="text" id="setting-class" placeholder="1" class="w-full border border-gray-300 rounded-md px-3 py-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-primary">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">報到驗證碼</label>
                        <input type="text" id="setting-verify" placeholder="例如: 已驗證" class="w-full border border-gray-300 rounded-md px-3 py-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-primary">
                    </div>
                    
                    <div class="pt-4 flex justify-end">
                        <button type="submit" id="btn-save-settings" class="btn-primary px-6 py-2 rounded-md font-medium flex items-center gap-2">
                            <i class="fa-solid fa-save"></i> 儲存設定
                        </button>
                    </div>
                </form>
            </div>
            
            <div class="card p-6 mb-6">
                <h3 class="text-lg font-semibold mb-4 border-b pb-2">檢視選項</h3>
                <div class="flex items-center justify-between py-2">
                    <div>
                        <p class="font-medium text-gray-800">大字版模式</p>
                        <p class="text-sm text-gray-500">放大報表單與列表字體</p>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="setting-large-text" class="sr-only peer">
                        <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
                    </label>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-member-list">
        <div class="fade-in max-w-4xl mx-auto h-full p-4 flex flex-col items-center justify-center text-gray-500">
            <i class="fa-solid fa-users text-5xl mb-4 text-gray-300"></i>
            <h2 class="text-xl font-bold mb-2 text-gray-700">班員資料 (功能建置中)</h2>
            <p>即將支援直接管理與新增班員資料功能。</p>
        </div>
    </template>
    
    <template id="tpl-class-view">
        <div class="fade-in max-w-4xl mx-auto h-full p-4 flex flex-col items-center justify-center text-gray-500">
            <i class="fa-solid fa-sitemap text-5xl mb-4 text-gray-300"></i>
