<!DOCTYPE html>
<html lang="zh-Hant" class="antialiased text-gray-900 bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>天達大班報到系統 (Prototype)</title>
    
    <!-- Tailwind CSS (CDN for Rapid Prototyping) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', // Disable automatic dark mode for simpler proto
            theme: {
                extend: {
                    colors: {
                        primary: {
                            DEFAULT: '#2F6783',
                            dark: '#1D4D63',
                            light: '#E0EDF5',
                        },
                        success: '#10B97A',
                        warning: '#FBBF24',
                        danger: '#F0554C',
                        neutral: '#8F8F8F',
                    }
                }
            }
        }
    </script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome (Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="h-screen w-full overflow-hidden flex flex-col md:flex-row bg-[#F5F7FA]">

    <!-- Desktop Sidebar (Hidden on Mobile) -->
    <aside class="hidden md:flex flex-col w-64 h-full bg-white border-r border-gray-200 flex-shrink-0 z-20">
        <div class="p-4 border-b border-gray-100 flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-primary text-white flex items-center justify-center font-bold">天</div>
            <h1 class="font-bold text-lg text-gray-800">大班報到系統</h1>
        </div>
        
        <div class="flex-1 overflow-y-auto pt-4 pb-20 no-scrollbar px-3 space-y-1">
            <a href="#" class="sidebar-item active flex items-center gap-3 px-3 py-2 text-sm font-medium" data-view="student-dashboard">
                <i class="fa-solid fa-house w-5 text-center"></i>
                即時檢視 (主頁)
            </a>
            
            <div class="pt-4 pb-1">
                <p class="px-3 text-xs font-semibold text-gray-400 uppercase tracking-wider">報到作業</p>
            </div>
            <a href="#" class="sidebar-item flex items-center gap-3 px-3 py-2 text-sm font-medium" data-view="admin-scanner">
                <i class="fa-solid fa-qrcode w-5 text-center"></i>
                掃描名牌QRCODE
            </a>
            <a href="#" class="sidebar-item flex items-center gap-3 px-3 py-2 text-sm font-medium" data-view="admin-manual-checkin">
                <i class="fa-solid fa-list-check w-5 text-center"></i>
                簡易報到
            </a>
            
            <div class="pt-4 pb-1">
                <p class="px-3 text-xs font-semibold text-gray-400 uppercase tracking-wider">人員與資料</p>
            </div>
            <a href="#" class="sidebar-item flex items-center gap-3 px-3 py-2 text-sm font-medium" data-view="member-list">
                <i class="fa-solid fa-users w-5 text-center"></i>
                班員資料
            </a>
            <a href="#" class="sidebar-item flex items-center gap-3 px-3 py-2 text-sm font-medium" data-view="class-view">
                <i class="fa-solid fa-sitemap w-5 text-center"></i>
                分班檢視
            </a>
            <a href="#" class="sidebar-item flex items-center gap-3 px-3 py-2 text-sm font-medium" data-view="quick-search">
                <i class="fa-solid fa-magnifying-glass w-5 text-center"></i>
                快速查詢
            </a>
            
            <div class="pt-4 pb-1">
                <p class="px-3 text-xs font-semibold text-gray-400 uppercase tracking-wider">統計與報表</p>
            </div>
            <a href="#" class="sidebar-item flex items-center gap-3 px-3 py-2 text-sm font-medium" data-view="attendance-stats">
                <i class="fa-solid fa-chart-pie w-5 text-center"></i>
                出席統計
            </a>
            
            <div class="pt-4 pb-1">
                <p class="px-3 text-xs font-semibold text-gray-400 uppercase tracking-wider">系統管理</p>
            </div>
            <a href="#" class="sidebar-item flex items-center gap-3 px-3 py-2 text-sm font-medium" data-view="class-schedule">
                <i class="fa-regular fa-calendar-days w-5 text-center"></i>
                班程資料
            </a>
            <a href="#" class="sidebar-item flex items-center gap-3 px-3 py-2 text-sm font-medium" data-view="tool-settings">
                <i class="fa-solid fa-gear w-5 text-center"></i>
                工具設定
            </a>
        </div>
        
        <div class="p-4 border-t border-gray-100 mt-auto">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center overflow-hidden">
                    <img src="https://i.pravatar.cc/100?img=11" alt="Admin" class="w-full h-full object-cover">
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-gray-900 truncate">Terry G</p>
                    <p class="text-xs text-gray-500 truncate">Admin</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content Area -->
    <div class="flex-1 flex flex-col h-full overflow-hidden relative w-full relative">
        
        <!-- Mobile Header -->
        <header class="md:hidden bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between z-10 sticky top-0">
            <h1 id="header-title" class="text-lg font-bold text-gray-800">報到系統 - 天達大班</h1>
            <div class="w-8 h-8 rounded-full bg-gray-200 overflow-hidden">
                <img src="https://i.pravatar.cc/100?img=11" alt="User" class="w-full h-full object-cover">
            </div>
        </header>

        <!-- View Container (Injected via JS) -->
        <main id="main-content" class="flex-1 overflow-y-auto p-4 md:p-8 pb-24 md:pb-8 w-full max-w-full">
            <!-- Initial Loading State -->
            <div class="flex flex-col items-center justify-center h-full text-gray-400">
                <i class="fa-solid fa-circle-notch fa-spin text-4xl mb-4 text-primary"></i>
                <p>載入中...</p>
            </div>
        </main>

    </div>

    <!-- Mobile Bottom Navigation -->
    <nav class="md:hidden fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 px-2 py-1 flex justify-between items-center z-50 pb-safe">
        <a href="#" class="nav-item active flex flex-col items-center justify-center w-1/5 py-2" data-target="home">
            <i class="fa-solid fa-house mb-1 text-lg"></i>
            <span class="text-[10px] font-medium">主頁</span>
        </a>
        <a href="#" class="nav-item flex flex-col items-center justify-center w-1/5 py-2" data-target="scanner">
            <i class="fa-solid fa-qrcode mb-1 text-lg"></i>
            <span class="text-[10px] font-medium">掃描</span>
        </a>
        <a href="#" class="nav-item flex flex-col items-center justify-center w-1/5 py-2" data-target="search">
            <i class="fa-solid fa-magnifying-glass mb-1 text-lg"></i>
            <span class="text-[10px] font-medium">查詢</span>
        </a>
        <a href="#" class="nav-item flex flex-col items-center justify-center w-1/5 py-2" data-target="stats">
            <i class="fa-solid fa-chart-pie mb-1 text-lg"></i>
            <span class="text-[10px] font-medium">統計</span>
        </a>
        <a href="#" class="nav-item flex flex-col items-center justify-center w-1/5 py-2" data-target="more">
            <i class="fa-solid fa-ellipsis mb-1 text-lg"></i>
            <span class="text-[10px] font-medium">更多</span>
        </a>
    </nav>

    <!-- Safe area support for iOS (Notch/Dynamic Island) -->
    <style>
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 0px); }
    </style>

    <!-- App Logic -->
    <script src="js/app.js"></script>
</body>
</html>
