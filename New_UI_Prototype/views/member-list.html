<!-- views/member-list.html -->
<div class="space-y-4 pb-6 max-w-4xl mx-auto">

    <!-- Header & Search (Sticky) -->
    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 md:sticky md:top-0 z-10 flex flex-col md:flex-row gap-4 items-start md:items-center justify-between">
        
        <div class="flex items-center gap-3">
            <h2 class="text-xl font-bold text-gray-800">班員資料</h2>
            <span class="bg-gray-100 text-gray-600 text-xs px-2 py-1 rounded-md font-medium">共 120 人</span>
        </div>
        
        <div class="flex gap-2 w-full md:w-auto">
            <div class="relative flex-1 md:w-64">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>
                <input type="text" class="w-full pl-10 pr-8 py-2 bg-gray-50 border border-transparent rounded-lg focus:bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-sm" placeholder="搜尋姓名、編號、單位...">
                <button class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600">
                    <i class="fa-solid fa-xmark text-sm"></i>
                </button>
            </div>
            
            <button class="bg-white border border-gray-200 hover:bg-gray-50 text-gray-700 px-3 py-2 rounded-lg text-sm font-medium transition-colors flex items-center gap-2 shadow-sm whitespace-nowrap">
                <i class="fa-solid fa-filter"></i> 篩選
            </button>
        </div>
    </div>

    <!-- Quick Filters / List Toggle -->
    <div class="flex gap-2 overflow-x-auto no-scrollbar pb-1 px-1">
        <button class="bg-primary text-white px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap shadow-sm">
            全部名單
        </button>
        <button class="bg-white border border-gray-200 text-gray-600 hover:bg-gray-50 px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-colors">
            臨時報到名單
        </button>
        <button class="bg-white border border-gray-200 text-gray-600 hover:bg-gray-50 px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-colors">
            輔導名單
        </button>
    </div>

    <!-- Member Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
        
        <!-- Member Card 1 (Clickable to Details) -->
        <a href="#" onclick="document.querySelector('[data-target=\'more\']').click(); setTimeout(()=>document.querySelector('[data-view=\'member-detail\']').click(), 50);" class="card p-4 hover:border-primary/50 hover:shadow-md transition-all group cursor-pointer block">
            <div class="flex items-start gap-4">
                <!-- Avatar -->
                <div class="relative">
                    <div class="w-14 h-14 rounded-full bg-gray-100 flex items-center justify-center overflow-hidden border border-gray-200 flex-shrink-0 group-hover:border-primary/30 transition-colors">
                        <img src="https://i.pravatar.cc/150?u=a042581f4e29026704d" alt="Profile" class="w-full h-full object-cover">
                    </div>
                    <div class="absolute -bottom-1 -right-1 bg-white rounded-full p-0.5 shadow-sm">
                        <div class="w-4 h-4 rounded-full bg-blue-500 border-2 border-white"></div> <!-- Online/Status indicator -->
                    </div>
                </div>
                
                <!-- Info -->
                <div class="flex-1 min-w-0">
                    <div class="flex items-center justify-between">
                        <h3 class="text-base font-bold text-gray-900 truncate pr-2 group-hover:text-primary transition-colors">簡嘉伸</h3>
                        <span class="badge badge-neutral text-[10px] py-0 px-1.5 h-[18px]">乾</span>
                    </div>
                    <p class="text-xs font-mono text-gray-500 mt-0.5">H311310080</p>
                    <div class="flex items-center gap-2 mt-1.5 text-xs text-gray-600">
                        <span>瑞芳區</span>
                        <span class="w-1 h-1 rounded-full bg-gray-300"></span>
                        <span>明理班</span>
                    </div>
                    
                    <!-- Tags -->
                    <div class="flex flex-wrap gap-1.5 mt-3">
                        <span class="bg-indigo-50 text-indigo-700 border border-indigo-100 px-2 py-0.5 rounded text-[10px] font-medium whitespace-nowrap">身心舒活</span>
                        <span class="bg-emerald-50 text-emerald-700 border border-emerald-100 px-2 py-0.5 rounded text-[10px] font-medium whitespace-nowrap">志工</span>
                    </div>
                </div>
                
                <!-- Right Arrow -->
                <div class="text-gray-300 group-hover:text-primary transition-colors self-center">
                    <i class="fa-solid fa-chevron-right text-sm"></i>
                </div>
            </div>
        </a>

        <!-- Member Card 2 -->
        <a href="#" class="card p-4 hover:border-primary/50 hover:shadow-md transition-all group cursor-pointer block">
            <div class="flex items-start gap-4">
                <div class="relative">
                    <div class="w-14 h-14 rounded-full bg-gray-100 text-gray-400 flex items-center justify-center font-bold text-lg border border-gray-200 flex-shrink-0">
                        丁
                    </div>
                </div>
                
                <div class="flex-1 min-w-0">
                    <div class="flex items-center justify-between">
                        <h3 class="text-base font-bold text-gray-900 truncate pr-2 group-hover:text-primary transition-colors">丁國恒</h3>
                        <span class="badge badge-neutral text-[10px] py-0 px-1.5 h-[18px]">乾</span>
                    </div>
                    <p class="text-xs font-mono text-gray-500 mt-0.5">H111310001</p>
                    <div class="flex items-center gap-2 mt-1.5 text-xs text-gray-600">
                        <span>內湖區</span>
                        <span class="w-1 h-1 rounded-full bg-gray-300"></span>
                        <span>新民班</span>
                    </div>
                    
                    <div class="flex flex-wrap gap-1.5 mt-3">
                        <span class="bg-indigo-50 text-indigo-700 border border-indigo-100 px-2 py-0.5 rounded text-[10px] font-medium whitespace-nowrap">烹飪社</span>
                    </div>
                </div>
                <div class="text-gray-300 group-hover:text-primary transition-colors self-center">
                    <i class="fa-solid fa-chevron-right text-sm"></i>
                </div>
            </div>
        </a>
        
        <!-- Member Card 3 -->
        <a href="#" class="card p-4 hover:border-primary/50 hover:shadow-md transition-all group cursor-pointer block">
            <div class="flex items-start gap-4">
                <div class="relative">
                    <div class="w-14 h-14 rounded-full bg-gray-100 text-gray-400 flex items-center justify-center font-bold text-lg border border-gray-200 flex-shrink-0">
                        于
                    </div>
                </div>
                
                <div class="flex-1 min-w-0">
                    <div class="flex items-center justify-between">
                        <h3 class="text-base font-bold text-gray-900 truncate pr-2 group-hover:text-primary transition-colors">于琴玲</h3>
                        <span class="badge badge-neutral text-[10px] py-0 px-1.5 h-[18px]">坤</span>
                    </div>
                    <p class="text-xs font-mono text-gray-500 mt-0.5">H311320125</p>
                    <div class="flex items-center gap-2 mt-1.5 text-xs text-gray-600">
                        <span>基隆區</span>
                        <span class="w-1 h-1 rounded-full bg-gray-300"></span>
                        <span>明理班</span>
                    </div>
                </div>
                <div class="text-gray-300 group-hover:text-primary transition-colors self-center">
                    <i class="fa-solid fa-chevron-right text-sm"></i>
                </div>
            </div>
        </a>

    </div>

    <!-- Pagination -->
    <div class="flex items-center justify-between bg-white px-4 py-3 border-t border-gray-200 sm:px-6 rounded-xl mt-4">
        <div class="flex flex-1 justify-between sm:hidden">
            <a href="#" class="relative inline-flex items-center rounded-md border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50">上一頁</a>
            <a href="#" class="relative ml-3 inline-flex items-center rounded-md border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50">下一頁</a>
        </div>
        <div class="hidden sm:flex sm:flex-1 sm:items-center sm:justify-between">
            <div>
                <p class="text-sm text-gray-700">
                    顯示 <span class="font-medium">1</span> 到 <span class="font-medium">20</span> 筆，共 <span class="font-medium">120</span> 筆
                </p>
            </div>
            <div>
                <nav class="isolate inline-flex -space-x-px rounded-md shadow-sm" aria-label="Pagination">
                    <a href="#" class="relative inline-flex items-center rounded-l-md px-2 py-2 text-gray-400 ring-1 ring-inset ring-gray-300 hover:bg-gray-50 focus:z-20 focus:outline-offset-0">
                        <span class="sr-only">Previous</span>
                        <i class="fa-solid fa-chevron-left h-5 w-5"></i>
                    </a>
                    <!-- Current: "z-10 bg-primary text-white focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary", Default: "text-gray-900 ring-1 ring-inset ring-gray-300 hover:bg-gray-50 focus:outline-offset-0" -->
                    <a href="#" aria-current="page" class="relative z-10 inline-flex items-center bg-primary px-4 py-2 text-sm font-semibold text-white focus:z-20 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary">1</a>
                    <a href="#" class="relative inline-flex items-center px-4 py-2 text-sm font-semibold text-gray-900 ring-1 ring-inset ring-gray-300 hover:bg-gray-50 focus:z-20 focus:outline-offset-0">2</a>
                    <a href="#" class="relative hidden items-center px-4 py-2 text-sm font-semibold text-gray-900 ring-1 ring-inset ring-gray-300 hover:bg-gray-50 focus:z-20 focus:outline-offset-0 md:inline-flex">3</a>
                    <span class="relative inline-flex items-center px-4 py-2 text-sm font-semibold text-gray-700 ring-1 ring-inset ring-gray-300 focus:outline-offset-0">...</span>
                    <a href="#" class="relative hidden items-center px-4 py-2 text-sm font-semibold text-gray-900 ring-1 ring-inset ring-gray-300 hover:bg-gray-50 focus:z-20 focus:outline-offset-0 md:inline-flex">6</a>
                    <a href="#" class="relative inline-flex items-center rounded-r-md px-2 py-2 text-gray-400 ring-1 ring-inset ring-gray-300 hover:bg-gray-50 focus:z-20 focus:outline-offset-0">
                        <span class="sr-only">Next</span>
                        <i class="fa-solid fa-chevron-right h-5 w-5"></i>
                    </a>
                </nav>
            </div>
        </div>
    </div>

</div>
