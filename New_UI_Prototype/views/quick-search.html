<!-- views/quick-search.html -->
<div class="h-full flex flex-col max-w-4xl mx-auto md:pb-6 relative pb-20"> <!-- extra pb for mobile nav -->
    
    <!-- Top Search Bar -->
    <div class="bg-white p-4 pb-2 z-10 sticky top-0 shadow-sm border-b border-gray-100 md:rounded-xl md:border md:static md:mb-4">
        <div class="flex gap-2 w-full">
            <div class="relative flex-1">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>
                <!-- Interactive Search Input -->
                <input type="text" class="w-full pl-10 pr-8 py-2.5 bg-gray-50 border border-transparent rounded-lg focus:bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-sm font-medium" placeholder="快速搜尋姓名..." value="丁">
                <button class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600">
                    <i class="fa-solid fa-xmark text-sm"></i>
                </button>
            </div>
            
            <button onclick="document.getElementById('filter-drawer').classList.toggle('translate-y-full'); document.getElementById('filter-backdrop').classList.toggle('hidden');" class="bg-primary hover:bg-primary-dark text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors flex items-center gap-2 shadow-sm whitespace-nowrap">
                <i class="fa-solid fa-sliders"></i> 進階
            </button>
        </div>
        
        <!-- Active Filters (Tag Pills) -->
        <div class="flex flex-wrap gap-2 mt-3 overflow-x-auto no-scrollbar pb-1">
            <span class="text-xs font-semibold text-gray-400 flex items-center">套用中:</span>
            <div class="inline-flex items-center gap-1.5 px-2.5 py-1 bg-primary-light text-primary-dark rounded text-xs font-medium border border-primary/20">
                2026/3/1
                <button class="hover:text-primary"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="inline-flex items-center gap-1.5 px-2.5 py-1 bg-danger/10 text-danger rounded text-xs font-medium border border-danger/20">
                缺席
                <button class="hover:text-danger-dark"><i class="fa-solid fa-xmark"></i></button>
            </div>
        </div>
    </div>

    <!-- Results Area -->
    <div class="flex-1 overflow-y-auto no-scrollbar md:p-0 p-4 pt-2">
        <div class="text-sm text-gray-500 mb-3 px-1">符合結果：共 2 人</div>
        
        <div class="space-y-3">
            <!-- Result Card 1 -->
            <div class="card p-4 hover:border-primary/50 transition-colors flex items-center justify-between group cursor-pointer" onclick="document.querySelector('[data-view=\'member-detail\']').click()">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-gray-100 text-gray-400 flex items-center justify-center font-bold text-lg border border-gray-200">
                        丁
                    </div>
                    <div>
                        <div class="flex items-center gap-2">
                            <h3 class="font-bold text-gray-900 group-hover:text-primary transition-colors">丁國恒</h3>
                            <span class="badge badge-neutral text-[10px] py-0 px-1.5 h-4">乾</span>
                        </div>
                        <p class="text-xs font-mono text-gray-500 mt-0.5">H111310001</p>
                    </div>
                </div>
                
                <div class="flex flex-col items-end gap-1">
                    <div class="inline-flex items-center gap-1.5 px-2 py-0.5 bg-danger/10 text-danger rounded-full text-xs font-medium border border-danger/20">
                        <div class="w-1.5 h-1.5 rounded-full bg-danger"></div>
                        未報到
                    </div>
                    <i class="fa-solid fa-chevron-right text-xs text-gray-300 mt-1"></i>
                </div>
            </div>

            <!-- Result Card 2 -->
            <div class="card p-4 hover:border-primary/50 transition-colors flex items-center justify-between group cursor-pointer" onclick="document.querySelector('[data-view=\'member-detail\']').click()">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-white border-2 border-success text-success flex items-center justify-center font-bold text-lg shadow-sm">
                        <i class="fa-solid fa-check"></i>
                    </div>
                    <div>
                        <div class="flex items-center gap-2">
                            <h3 class="font-bold text-gray-900 group-hover:text-primary transition-colors">丁義國</h3>
                            <span class="badge badge-neutral text-[10px] py-0 px-1.5 h-4">乾</span>
                        </div>
                        <p class="text-xs font-mono text-gray-500 mt-0.5">H211310005</p>
                    </div>
                </div>
                
                <div class="flex flex-col items-end gap-1">
                    <div class="inline-flex items-center gap-1.5 px-2 py-0.5 bg-success/10 text-success rounded-full text-xs font-medium border border-success/20">
                        <div class="w-1.5 h-1.5 rounded-full bg-success"></div>
                        已報到
                    </div>
                    <i class="fa-solid fa-chevron-right text-xs text-gray-300 mt-1"></i>
                </div>
            </div>
            
        </div>
    </div>

    <!-- Advanced Filter Bottom Sheet (Hidden by default) -->
    <div id="filter-backdrop" class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm z-40 hidden transition-opacity" onclick="document.getElementById('filter-drawer').classList.add('translate-y-full'); this.classList.add('hidden');"></div>
    
    <div id="filter-drawer" class="fixed bottom-0 left-0 right-0 bg-white rounded-t-3xl z-50 transform translate-y-full transition-transform duration-300 ease-in-out shadow-[0_-10px_40px_rgba(0,0,0,0.1)] md:max-w-md md:left-auto md:right-8 md:top-24 md:bottom-auto md:rounded-2xl md:translate-y-0 md:hidden md:border md:border-gray-200">
        <!-- Handle for mobile -->
        <div class="w-full flex justify-center pt-3 pb-1 md:hidden" onclick="document.getElementById('filter-drawer').classList.add('translate-y-full'); document.getElementById('filter-backdrop').classList.add('hidden');">
            <div class="w-12 h-1.5 bg-gray-300 rounded-full"></div>
        </div>
        
        <div class="px-6 pb-6 pt-2">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-lg font-bold text-gray-800">進階篩選條件</h3>
                <button class="text-gray-400 hover:text-gray-600 md:block hidden" onclick="this.closest('#filter-drawer').classList.add('hidden'); document.getElementById('filter-backdrop').classList.add('hidden');"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            
            <div class="space-y-4">
                <!-- Date -->
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">查詢日期</label>
                    <select class="w-full bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-lg focus:ring-primary focus:border-primary block p-2.5">
                        <option>2026/3/1</option>
                        <option>2026/2/15</option>
                        <option>2026/2/1</option>
                    </select>
                </div>
                
                <!-- Class Type -->
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">班別</label>
                        <select class="w-full bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-lg focus:ring-primary block p-2.5">
                            <option>第一週日</option>
                            <option>第三週日</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">狀態</label>
                        <select class="w-full bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-lg focus:ring-primary block p-2.5">
                            <option>缺席</option>
                            <option>未報到</option>
                            <option>已報到</option>
                            <option>全部</option>
                        </select>
                    </div>
                </div>

                <!-- Unit & Class -->
                <div class="grid grid-cols-2 gap-3 pb-2 border-b border-gray-100">
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">單位</label>
                        <select class="w-full bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-lg focus:ring-primary block p-2.5">
                            <option>全部區別</option>
                            <option>瑞芳區</option>
                            <option>內湖區</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">班級</label>
                        <select class="w-full bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-lg focus:ring-primary block p-2.5">
                            <option>全部</option>
                            <option>明理班</option>
                            <option>大德班</option>
                        </select>
                    </div>
                </div>
                
                <!-- Batch Button -->
                <button class="w-full py-3 bg-indigo-50 text-indigo-700 hover:bg-indigo-100 rounded-xl font-medium text-sm flex items-center justify-center gap-2 transition-colors border border-indigo-100">
                    <i class="fa-solid fa-users-viewfinder"></i> 姓名批次查詢 (貼上多筆)
                </button>
            </div>
            
            <!-- Actions -->
            <div class="flex gap-3 mt-6">
                <button class="flex-1 bg-white border border-gray-200 text-gray-700 font-medium py-3 rounded-xl hover:bg-gray-50 transition-colors" onclick="document.getElementById('filter-drawer').classList.add('translate-y-full'); document.getElementById('filter-backdrop').classList.add('hidden');">
                    清除全部
                </button>
                <button class="flex-1 bg-primary text-white font-medium py-3 rounded-xl hover:bg-primary-dark shadow-sm transition-colors" onclick="document.getElementById('filter-drawer').classList.add('translate-y-full'); document.getElementById('filter-backdrop').classList.add('hidden');">
                    套用篩選
                </button>
            </div>
        </div>
    </div>
</div>
