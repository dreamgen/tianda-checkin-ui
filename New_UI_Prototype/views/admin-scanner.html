<!-- views/admin-scanner.html -->
<div class="h-full flex flex-col pt-0">
    <!-- Scanner Area -->
    <div class="relative bg-black rounded-2xl overflow-hidden aspect-[3/4] md:aspect-video w-full max-w-2xl mx-auto shadow-2xl flex flex-col items-center justify-center group">
        
        <!-- Fake Camera Feed Background -->
        <img src="https://images.unsplash.com/photo-1511632765486-a01980e01a18?q=80&w=800&auto=format&fit=crop" class="absolute inset-0 w-full h-full object-cover opacity-60" alt="Camera Feed">
        
        <!-- Focus Box Overlay -->
        <div class="relative z-10 w-64 h-64 border-2 border-white/50 rounded-xl flex items-center justify-center">
            <!-- Corner Accents -->
            <div class="absolute -top-1 -left-1 w-8 h-8 border-t-4 border-l-4 border-success rounded-tl-xl transition-all duration-300 group-hover:scale-110 group-hover:-translate-x-1 group-hover:-translate-y-1"></div>
            <div class="absolute -top-1 -right-1 w-8 h-8 border-t-4 border-r-4 border-success rounded-tr-xl transition-all duration-300 group-hover:scale-110 group-hover:translate-x-1 group-hover:-translate-y-1"></div>
            <div class="absolute -bottom-1 -left-1 w-8 h-8 border-b-4 border-l-4 border-success rounded-bl-xl transition-all duration-300 group-hover:scale-110 group-hover:-translate-x-1 group-hover:translate-y-1"></div>
            <div class="absolute -bottom-1 -right-1 w-8 h-8 border-b-4 border-r-4 border-success rounded-br-xl transition-all duration-300 group-hover:scale-110 group-hover:translate-x-1 group-hover:translate-y-1"></div>
            
            <!-- Scanning Line Animation -->
            <div class="w-full h-0.5 bg-success shadow-[0_0_10px_#10B97A] absolute top-0 animate-[scan_2.5s_ease-in-out_infinite]"></div>
            
            <style>
                @keyframes scan {
                    0% { top: 0; opacity: 0; }
                    10% { opacity: 1; }
                    90% { opacity: 1; }
                    100% { top: 100%; opacity: 0; }
                }
            </style>
        </div>

        <!-- Helper Text & Flashlight -->
        <div class="absolute bottom-6 w-full px-6 flex justify-between items-center z-10">
            <button class="w-12 h-12 rounded-full bg-black/50 backdrop-blur-md text-white border border-white/20 flex items-center justify-center hover:bg-white/20 transition-colors">
                <i class="fa-solid fa-bolt"></i>
            </button>
            <p class="text-white text-sm font-medium bg-black/50 backdrop-blur-md px-4 py-1.5 rounded-full border border-white/20">請將 QR Code 對準框內</p>
            <button class="w-12 h-12 rounded-full bg-black/50 backdrop-blur-md text-white border border-white/20 flex items-center justify-center hover:bg-white/20 transition-colors">
                <i class="fa-solid fa-camera-rotate"></i>
            </button>
        </div>
        
        <!-- Success State Overlay Mockup (Hidden by default, shown for demo) -->
        <div class="absolute inset-0 bg-success/90 backdrop-blur-sm z-50 flex flex-col items-center justify-center text-white p-6 opacity-0 hover:opacity-100 transition-opacity duration-300 cursor-pointer">
            <div class="w-20 h-20 rounded-full bg-white text-success flex items-center justify-center text-4xl mb-4 shadow-lg scale-90 hover:scale-100 transition-transform">
                <i class="fa-solid fa-check"></i>
            </div>
            <h2 class="text-3xl font-bold mb-1 tracking-wide">丁義國</h2>
            <p class="text-white/80 font-mono text-lg mb-4 opacity-90 tracking-wider">H211310005</p>
            <span class="bg-white/20 border border-white/30 px-3 py-1 rounded-full text-sm font-medium">報到成功</span>
            <p class="mt-8 text-xs text-white/60">(移開滑鼠繼續掃描)</p>
        </div>
    </div>

    <!-- Manual Entry Fallback -->
    <div class="mt-8 max-w-md mx-auto w-full text-center pb-8">
        <p class="text-[var(--color-subtext)] mb-4 text-sm font-medium">無法掃描？改用手動報到</p>
        <div class="flex gap-2">
            <div class="relative flex-1">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                    <i class="fa-solid fa-keyboard"></i>
                </div>
                <input type="text" class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-all text-sm shadow-sm" placeholder="輸入班員編號 (如: H31...)">
            </div>
            <button class="bg-primary hover:bg-primary-dark text-white px-6 py-3 rounded-xl font-medium transition-colors shadow-sm">
                確認
            </button>
        </div>
    </div>
</div>
