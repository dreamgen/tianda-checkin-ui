<!-- views/tool-settings.html -->
<div class="pb-8 max-w-4xl mx-auto">
    
    <div class="mb-6 px-2 md:px-0">
        <h2 class="text-2xl font-bold text-gray-800">工具設定</h2>
        <p class="text-sm text-gray-500 mt-1">系統環境參數與輔助 APP 自動派發設定。</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- Parameter Setup Form -->
        <div class="lg:col-span-5">
            <div class="card p-5 sticky top-20">
                <h3 class="font-bold text-gray-800 mb-4 border-b border-gray-100 pb-2 flex items-center gap-2">
                    <i class="fa-solid fa-sliders text-primary"></i> 報到參數設定
                </h3>
                
                <form class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">選擇日期 <span class="text-danger">*</span></label>
                        <input type="date" value="2026-03-15" class="w-full bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-lg focus:ring-primary focus:border-primary block p-2.5">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">選擇班別 <span class="text-danger">*</span></label>
                        <select class="w-full bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-lg focus:ring-primary focus:border-primary block p-2.5">
                            <option>第一週日</option>
                            <option selected>第三週日</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">報到模式</label>
                        <div class="flex gap-4 p-1 bg-gray-50 rounded-lg border border-gray-200">
                            <label class="flex-1 text-center py-2 rounded-md bg-white shadow-sm font-medium text-sm text-primary cursor-pointer border border-primary/20">
                                <input type="radio" name="mode" class="sr-only" checked>
                                實體 (現場)
                            </label>
                            <label class="flex-1 text-center py-2 rounded-md text-sm font-medium text-gray-500 hover:text-gray-700 cursor-pointer">
                                <input type="radio" name="mode" class="sr-only">
                                線上 (遠端)
                            </label>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">建置包名稱</label>
                        <input type="text" value="天達大班-實體3" class="w-full bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-lg focus:ring-primary focus:border-primary block p-2.5">
                    </div>

                    <div class="flex items-center justify-between pt-2">
                        <div>
                            <span class="block text-sm font-medium text-gray-700">相容舊版 QR Code</span>
                            <span class="text-xs text-gray-500">支援解析特定舊版字串格式</span>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" checked class="sr-only peer">
                            <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
                        </label>
                    </div>

                    <div class="pt-4 border-t border-gray-100">
                        <button type="button" class="w-full btn-primary px-4 py-3 rounded-lg text-sm font-bold shadow-sm flex items-center justify-center gap-2 hover:bg-primary-dark transition-colors">
                            <i class="fa-solid fa-wand-magic-sparkles"></i> 點擊產生專屬設定
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Deployment & Connect Area -->
        <div class="lg:col-span-7 space-y-4">
            
            <div class="bg-success/10 border border-success/20 rounded-xl p-4 flex items-start gap-3">
                <div class="w-6 h-6 rounded-full bg-success text-white flex items-center justify-center text-xs flex-shrink-0 mt-0.5">
                    <i class="fa-solid fa-check"></i>
                </div>
                <div>
                    <h4 class="font-bold text-success-dark">設定已生效：天達大班-實體3</h4>
                    <p class="text-xs text-success-700 mt-1">請選擇對應平台的 APP 配置方式，將設定派發給現場幹部。</p>
                </div>
            </div>

            <!-- Deployment Cards Grid -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                
                <!-- Card 1 -->
                <div class="card p-4 hover:border-primary/30 transition-colors">
                    <div class="flex items-center gap-3 mb-3">
                        <div class="w-10 h-10 rounded-lg bg-gray-100 text-gray-600 flex items-center justify-center text-xl">
                            <i class="fa-solid fa-mobile-screen"></i>
                        </div>
                        <div>
                            <h4 class="font-bold text-gray-800 text-sm">自動報到 APP</h4>
                            <p class="text-[10px] text-gray-500">Android / PWA 網頁版</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button class="flex-1 bg-gray-50 hover:bg-gray-100 text-gray-700 text-xs font-medium py-2 rounded border border-gray-200 transition-colors flex items-center justify-center gap-1.5">
                            <i class="fa-regular fa-copy"></i> 複製連結
                        </button>
                        <button class="flex-1 bg-primary text-white hover:bg-primary-dark text-xs font-medium py-2 rounded transition-colors flex items-center justify-center gap-1.5" onclick="alert('Demo: 彈出顯示大螢幕 QR Code')">
                            <i class="fa-solid fa-qrcode"></i> 顯示 QR
                        </button>
                    </div>
                </div>

                <!-- Card 2 -->
                <div class="card p-4 hover:border-primary/30 transition-colors">
                    <div class="flex items-center gap-3 mb-3">
                        <div class="w-10 h-10 rounded-lg bg-gray-100 text-gray-600 flex items-center justify-center text-xl">
                            <i class="fa-solid fa-barcode"></i>
                        </div>
                        <div>
                            <h4 class="font-bold text-gray-800 text-sm">掃碼輔助 APP</h4>
                            <p class="text-[10px] text-gray-500">iOS / Android</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button class="flex-1 bg-gray-50 hover:bg-gray-100 text-gray-700 text-xs font-medium py-2 rounded border border-gray-200 transition-colors flex items-center justify-center gap-1.5">
                            <i class="fa-regular fa-copy"></i> 複製連結
                        </button>
                        <button class="flex-1 bg-primary text-white hover:bg-primary-dark text-xs font-medium py-2 rounded transition-colors flex items-center justify-center gap-1.5" onclick="alert('Demo: 彈出顯示大螢幕 QR Code')">
                            <i class="fa-solid fa-qrcode"></i> 顯示 QR
                        </button>
                    </div>
                </div>

                <!-- Card 3 -->
                <div class="card p-4 hover:border-primary/30 transition-colors sm:col-span-2">
                    <div class="flex items-center gap-3 mb-3">
                        <div class="w-10 h-10 rounded-lg bg-gray-100 text-gray-600 flex items-center justify-center text-xl">
                            <i class="fa-solid fa-gears"></i>
                        </div>
                        <div>
                            <h4 class="font-bold text-gray-800 text-sm">自動完成環境設定檔</h4>
                            <p class="text-[10px] text-gray-500">涵蓋全平台設定參數包</p>
                        </div>
                    </div>
                    <div class="flex flex-col sm:flex-row gap-2">
                        <input type="text" readonly value="https://tianda.app/setup/?c=eyJkYXRlIjoiMjAy" class="flex-1 bg-gray-50 border border-gray-200 text-gray-600 text-[11px] font-mono rounded px-3 py-2 outline-none">
                        <button class="bg-gray-800 hover:bg-black text-white text-xs font-medium px-4 py-2 rounded transition-colors flex items-center justify-center gap-1.5 whitespace-nowrap">
                            <i class="fa-regular fa-copy"></i> 複製一鍵安裝
                        </button>
                    </div>
                </div>
            </div>

            <!-- Share Overall -->
            <button class="w-full mt-2 bg-white border border-gray-200 text-gray-700 font-bold py-3.5 rounded-xl hover:bg-gray-50 shadow-sm transition-colors flex items-center justify-center gap-2">
                <i class="fa-solid fa-share-nodes text-primary"></i> 系統通用分享 (呼叫原生選單)
            </button>
            
        </div>
    </div>
</div>
